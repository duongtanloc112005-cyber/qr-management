function xemLichSuMa(maGoc){
  const id = (maGoc || '').toString().trim();
  if (!id) {
    alert('⚠️ Không tìm thấy mã sản phẩm!');
    return;
  }
  
  const log = [];
  
  // 1. Lịch sử thời gian các bộ phận thêm sản phẩm
  const pushIf = (label, map) => {
    if (!map) return;
    try {
      const t = map.get(id);
      if (t) log.push(`📅 ${label} (thêm sản phẩm): ${t}`);
    } catch(e) {}
  };
  
  pushIf('KP', moduleTimes.khophoi);
  pushIf('SX', moduleTimes.sanxuat);
  pushIf('TP', moduleTimes.thanhpham);
  pushIf('HS', moduleTimes.hangsan);
  pushIf('HT', moduleTimes.hangton);
  pushIf('ĐH', moduleTimes.donghang);
  
  // 2. Lịch sử trạng thái từ item.lichSu (tìm trong mergedData, duLieu, hoặc các module)
  let item = null;
  
  // Tìm trong mergedData trước (dữ liệu đã merge từ tất cả các module)
  if (mergedData && Array.isArray(mergedData) && mergedData.length > 0) {
    item = mergedData.find(p => {
      const maGocItem = (p.maGoc || p.ma || '').toString().trim();
      return maGocItem === id;
    });
  }
  
  // Nếu không tìm thấy, tìm trong duLieu
  if (!item && duLieu && Array.isArray(duLieu) && duLieu.length > 0) {
    item = duLieu.find(p => {
      const maGocItem = (p.maGoc || p.ma || '').toString().trim();
      return maGocItem === id;
    });
  }
  
  // Nếu vẫn không tìm thấy, tìm trong tất cả các module data
  if (!item && typeof moduleData !== 'undefined') {
    for (const moduleName in moduleData) {
      if (moduleData[moduleName] && Array.isArray(moduleData[moduleName])) {
        item = moduleData[moduleName].find(p => {
          const maGocItem = (p.maGoc || p.ma || '').toString().trim();
          return maGocItem === id;
        });
        if (item) break; // Tìm thấy rồi thì dừng
      }
    }
  }
  
  if (item && item.lichSu && Array.isArray(item.lichSu) && item.lichSu.length > 0) {
    log.push('\n📋 Lịch sử trạng thái:');
    item.lichSu.forEach(ls => {
      if (ls.thoiGian && ls.trangThai) {
        log.push(`  • ${ls.thoiGian}: ${ls.trangThai}`);
      }
    });
  }
  
  if (log.length === 0) {
    alert('⚠️ Chưa có lịch sử cho sản phẩm này!');
    return;
  }
  
  // Hiển thị trong alert hoặc có thể dùng modal đẹp hơn
  alert(`📜 Lịch sử sản phẩm: ${id}\n\n${log.join("\n")}`);
}

async function exportExcel(){
  try {
    const dataSrc = (Array.isArray(exportData) && exportData.length >= 0) ? exportData : filteredData;
    if(!dataSrc || dataSrc.length===0){alert("⚠️ Không có dữ liệu phù hợp bộ lọc để xuất!");return;}

  // Hàm trích xuất mã sản phẩm ngắn gọn (chỉ phần sau dấu | đầu tiên)
  const getMaSanPhamNgan = (maGoc) => {
    if (!maGoc) return '';
    const maStr = maGoc.toString();
    const index = maStr.indexOf('|');
    if (index === -1) return maStr; // Nếu không có dấu |, trả về nguyên mã
    return maStr.substring(index + 1).trim(); // Lấy phần sau dấu | và trim
  };

  // Tạo workbook mới với ExcelJS
  const workbook = new ExcelJS.Workbook();
  
  // Hàm helper để xác định mức độ thụt lề từ nội dung
  const getIndentLevel = (value) => {
    if (!value || typeof value !== 'string') return 0;
    const leadingSpaces = value.length - value.trimStart().length;
    const trimmed = value.trim();
    if (trimmed.includes('Thống kê') || trimmed.includes('Tổng sản phẩm')) {
      return 0;
    }
    if (trimmed.startsWith('•')) {
      if (leadingSpaces >= 9) return 3;
      if (leadingSpaces >= 6) return 2;
      return 2;
    } else if (trimmed.startsWith('-')) {
      if (leadingSpaces >= 6) return 2;
      return 1;
    }
    if (leadingSpaces >= 9) return 3;
    if (leadingSpaces >= 6) return 2;
    if (leadingSpaces >= 3) return 1;
    return 0;
  };

  const cleanIndentString = (value) => {
    if (!value || typeof value !== 'string') return value;
    return value.trimStart();
  };

  const applyCellStyle = (cell, options = {}) => {
    const cellValue = cell.value;
    const indentLevel = options.indent !== undefined ? options.indent : getIndentLevel(cellValue);
    cell.alignment = {
      vertical: options.vertical || 'middle',
      horizontal: options.horizontal || 'left',
      wrapText: options.wrapText !== false,
      indent: indentLevel
    };
    cell.border = {
      top: {style:'thin', color:{argb:'FF000000'}},
      left: {style:'thin', color:{argb:'FF000000'}},
      bottom: {style:'thin', color:{argb:'FF000000'}},
      right: {style:'thin', color:{argb:'FF000000'}}
    };
    if(options.font) { cell.font = options.font; }
    if(options.fill) { cell.fill = options.fill; }
    if (options.cleanValue && cellValue && typeof cellValue === 'string') {
      cell.value = cleanIndentString(cellValue);
    }
  };

  const autoFitColumns = (worksheet) => {
    if (!worksheet || !worksheet.columns) return;
    worksheet.columns.forEach((column, colIndex) => {
      if (!column) return;
      let maxLength = 0;
      try {
        const headerRow = worksheet.getRow(1);
        if (headerRow) {
          const headerCell = headerRow.getCell(colIndex + 1);
          if (headerCell && headerCell.value !== null && headerCell.value !== undefined) {
            maxLength = String(headerCell.value).length;
          }
        }
      } catch (e) {}
      if (worksheet.rowCount > 1) {
        for (let rowIndex = 2; rowIndex <= worksheet.rowCount; rowIndex++) {
          try {
            const row = worksheet.getRow(rowIndex);
            if (row) {
              const cell = row.getCell(colIndex + 1);
              if (cell && cell.value !== null && cell.value !== undefined && cell.value !== '') {
                const cellValue = String(cell.value);
                const cellLength = cellValue.length;
                if (cellLength > maxLength) {
                  maxLength = cellLength;
                }
              }
            }
          } catch (e) { continue; }
        }
      }
      if (column) {
        column.width = Math.min(Math.max(maxLength + 2, 10), 60);
      }
    });
  };

  // --- Sheet 1: Chi tiết ---
  const wsChiTiet = workbook.addWorksheet('Chi_tiet');
  wsChiTiet.addRow(['STT', 'Mã sản phẩm', 'Trạng thái', 'Đợt hàng', 'Loại hàng', 'Loại SX', 'Màu', 'Size', 'Ghi chú', 'Lịch sử']);
  const headerRow = wsChiTiet.getRow(1);
  headerRow.font = { bold: true, color: { argb: 'FFFFFFFF' } };
  headerRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF2196F3' } };
  headerRow.height = 25;
  headerRow.eachCell((cell) => {
    applyCellStyle(cell, {
      horizontal: 'center',
      vertical: 'middle',
      wrapText: true,
      font: { bold: true, color: { argb: 'FFFFFFFF' } }
    });
  });
  // Hàm xác định trạng thái đúng theo bộ phận
  const getTrangThaiTheoBoPhan = (maGoc, trangThaiMacDinh = '') => {
    const code = (maGoc || '').toString().toLowerCase();
    const isHS = code.startsWith('hs');
    const isHT = code.startsWith('ht');
    
    // Xác định bộ phận cuối cùng mà sản phẩm đã đi qua
    // Ưu tiên: Đóng hàng > Thành phẩm > Sản xuất > Kho phôi > Hàng sẵn > Hàng tồn
    if (presenceMaps.donghang.has(maGoc)) {
      return 'Nhận hàng';
    } else if (presenceMaps.thanhpham.has(maGoc)) {
      return 'Hoàn thiện';

      return 'In & thêu';
    } else if (presenceMaps.khophoi.has(maGoc)) {
      return 'Bàn giao';
    } else if (isHS && presenceMaps.hangsan.has(maGoc)) {
      return 'Bàn giao';
    } else if (isHT && presenceMaps.hangton.has(maGoc)) {
      return 'Bàn giao';
    }
    // Mặc định: trả về trạng thái hiện tại nếu không xác định được
    return trangThaiMacDinh || '';
  };
  
  dataSrc.forEach((d, i) => {
    const trangThaiExcel = getTrangThaiTheoBoPhan(d.maGoc, d.trangThai);
    // Trích xuất mã sản phẩm ngắn gọn (chỉ phần sau dấu | đầu tiên)
    const maGocNgan = getMaSanPhamNgan(d.maGoc);
    const row = wsChiTiet.addRow([
      i + 1, maGocNgan, trangThaiExcel, d.dotHang, d.loaiHang, d.loaiSX, d.mau || '', d.size || '',
      d.ghiChu || '', (d.lichSu || []).map(l => `${l.thoiGian}: ${l.trangThai}`).join('\n')
    ]);
    row.eachCell((cell) => {
      applyCellStyle(cell, { horizontal: 'left', vertical: 'middle', wrapText: true });
    });
    row.getCell(1).alignment = { ...row.getCell(1).alignment, horizontal: 'center' };
  });

  // ====== CÁC HÀM NHÓM DỮ LIỆU DÙNG CHUNG ======
  const group = (field, arr=dataSrc) => {
    const r={};
    (arr||[]).forEach(d=>{
      const k=d[field]||"(Trống)";
      r[k]=(r[k]||0)+1;
    });
    return r;
  };
  const sumKeys = (obj, keys) => keys.reduce((s,k)=>s+(obj[k]||0),0);

  // Chuẩn hóa tên nhóm đợt
  const shopeeGroup=["sp1","sp2","sp3","sp4","sp5","sp6","sp7","sp8","sp9","sp10","spthieu"];
  const khacGroup=["mvd","ctv","sapo","bnv","sale"];
  const lonGroup=["inlon","theulon","tonbaolon","dhbaolon","phoisoanlon","tonsoanlon","donglon"];
  const huGroup=["inhu","theuhu","pethu","lotpethu","mayhu","do","lun"];
  const groupDotHang = group("dotHang");

  const tongShopee = sumKeys(groupDotHang, shopeeGroup);
  const tongKhac    = sumKeys(groupDotHang, khacGroup);
  const tongLon     = sumKeys(groupDotHang, lonGroup);
  const tongHu      = sumKeys(groupDotHang, huGroup);
  const siGroup     = Object.keys(groupDotHang).filter(n=>n?.toLowerCase().startsWith("si"));
  const tongSi      = sumKeys(groupDotHang, siGroup);

  // ====== Sheet 2: Thống kê (đang có) ======
  // Giữ nguyên cách render chi tiết per-đợt như file hiện tại
  const groupDotSX = {};
  dataSrc.forEach(d=>{
    if(!groupDotSX[d.dotHang]) groupDotSX[d.dotHang]={};
    groupDotSX[d.dotHang][d.loaiSX] = (groupDotSX[d.dotHang][d.loaiSX]||0)+1;
  });

  const renderDotHangChiTiet = (tenNhom, danhSachDot, tongNhom) => {
    let rows=[];
    rows.push([`Tổng sản phẩm ${tenNhom}`, tongNhom]);
    danhSachDot.filter(n=>(groupDotHang[n]||0)>0).forEach(n=>{
      rows.push(["   "+n, groupDotHang[n]]);
      if(groupDotSX[n]){
        Object.entries(groupDotSX[n]).sort((a, b) => {
          const indexA = LOAI_SX_ORDER.indexOf(a[0].toLowerCase());
          const indexB = LOAI_SX_ORDER.indexOf(b[0].toLowerCase());
          if (indexA !== -1 && indexB !== -1) return indexA - indexB;
          if (indexA !== -1) return -1;
          if (indexB !== -1) return 1;
          return a[0].localeCompare(b[0]);
        }).forEach(([sx,sl])=>{
          rows.push(["      - "+sx, sl]);
          const loaiHangCounts={};
          dataSrc.filter(d=>d.dotHang===n && d.loaiSX===sx).forEach(d=>{
            if(d.loaiHang){
              loaiHangCounts[d.loaiHang]=(loaiHangCounts[d.loaiHang]||0)+1;
            }
          });
          Object.entries(loaiHangCounts).sort((a, b) => {
            const indexA = LOAI_HANG_ORDER.indexOf(a[0].toLowerCase());
            const indexB = LOAI_HANG_ORDER.indexOf(b[0].toLowerCase());
            if (indexA !== -1 && indexB !== -1) return indexA - indexB;
            if (indexA !== -1) return -1;
            if (indexB !== -1) return 1;
            return a[0].localeCompare(b[0]);
          }).forEach(([lh,slh])=>{
            rows.push(["         • "+lh, slh]);
          });
        });
      }
    });
    rows.push([]);
    return rows;
  };

  const thongKe=[
    ["🛍️ Thống kê đợt hàng:"],
    ...renderDotHangChiTiet("Shopee", shopeeGroup, tongShopee),
    ...renderDotHangChiTiet("Khác", khacGroup, tongKhac),
    ...renderDotHangChiTiet("Lộn", lonGroup, tongLon),
    ...renderDotHangChiTiet("Lỗi", huGroup, tongHu),
    ...renderDotHangChiTiet("Sỉ", siGroup, tongSi),
    [],
    ["🛍️ Thống kê loại hàng:"],...Object.entries(group("loaiHang")).sort((a, b) => {
      const indexA = LOAI_HANG_ORDER.indexOf(a[0].toLowerCase());
      const indexB = LOAI_HANG_ORDER.indexOf(b[0].toLowerCase());
      if (indexA !== -1 && indexB !== -1) return indexA - indexB;
      if (indexA !== -1) return -1;
      if (indexB !== -1) return 1;
      return a[0].localeCompare(b[0]);
    }),
    [],
    ["🏭 Thống kê loại SX:"],...Object.entries(group("loaiSX")).sort((a, b) => {
      const indexA = LOAI_SX_ORDER.indexOf(a[0].toLowerCase());
      const indexB = LOAI_SX_ORDER.indexOf(b[0].toLowerCase());
      if (indexA !== -1 && indexB !== -1) return indexA - indexB;
      if (indexA !== -1) return -1;
      if (indexB !== -1) return 1;
      return a[0].localeCompare(b[0]);
    }),
    [],
    ["📊 Trạng thái:"],...Object.entries(group("trangThai"))
  ];
  
  // Sheet 2: Thống kê với ExcelJS
  const wsThongKe = workbook.addWorksheet('Thong_ke');
  thongKe.forEach(row => {
    const excelRow = wsThongKe.addRow(row);
    excelRow.eachCell((cell, colNumber) => {
      if (colNumber === 1) {
        applyCellStyle(cell, {
          horizontal: 'left',
          vertical: 'middle',
          wrapText: true,
          cleanValue: true
        });
      } else {
        applyCellStyle(cell, {
          horizontal: typeof row[1] === 'number' ? 'right' : 'left',
          vertical: 'middle',
          wrapText: true,
          indent: 0
        });
      }
    });
  });

  // ====== Sheet 3: RÚT GỌN (mới) ======
  // Yêu cầu: phần "Shopee" chỉ hiện TỔNG theo Loại SX -> Loại hàng (không tách sp1/sp2…),
  // các nhóm khác vẫn tách theo từng đợt rồi liệt kê Loại SX -> Loại hàng.
  const rowsRutGon = [];

  // Header
  rowsRutGon.push(["🛍️ Thống kê đợt hàng:"]);

  // --- SHOPEE (rút gọn): tổng theo SX -> Loại hàng
  rowsRutGon.push([`Tổng sản phẩm Shopee`, tongShopee]);

  const duLieuShopee = dataSrc.filter(d=>shopeeGroup.includes(d.dotHang));
  const sxShopee = group("loaiSX", duLieuShopee); // { in:84, kt:6, theu:11, ... }

  // Liệt kê theo SX và lồng Loại hàng
  Object.entries(sxShopee).sort((a, b) => {
    const indexA = LOAI_SX_ORDER.indexOf(a[0].toLowerCase());
    const indexB = LOAI_SX_ORDER.indexOf(b[0].toLowerCase());
    if (indexA !== -1 && indexB !== -1) return indexA - indexB;
    if (indexA !== -1) return -1;
    if (indexB !== -1) return 1;
    return a[0].localeCompare(b[0]);
  }).forEach(([sx, slSX])=>{
    if(!sx || sx==="(Trống)") return;
    rowsRutGon.push([`   - ${sx}`, slSX]);

    // Đếm loại hàng trong phạm vi SX đó
    const loaiHangBySX = {};
    duLieuShopee.filter(d=>d.loaiSX===sx).forEach(d=>{
      if(!d.loaiHang) return;
      loaiHangBySX[d.loaiHang] = (loaiHangBySX[d.loaiHang]||0)+1;
    });
    Object.entries(loaiHangBySX).sort((a, b) => {
      const indexA = LOAI_HANG_ORDER.indexOf(a[0].toLowerCase());
      const indexB = LOAI_HANG_ORDER.indexOf(b[0].toLowerCase());
      if (indexA !== -1 && indexB !== -1) return indexA - indexB;
      if (indexA !== -1) return -1;
      if (indexB !== -1) return 1;
      return a[0].localeCompare(b[0]);
    }).forEach(([lh, slLH])=>{
      rowsRutGon.push([`      • ${lh}`, slLH]);
    });
  });
  rowsRutGon.push([]);

// ===== Sỉ: SX -> Loai Hang
const duLieuSi = duLieu.filter(d=>siGroup.includes(d.dotHang));
const sxSi = group("loaiSX", duLieuSi);
rowsRutGon.push([`Tổng sản phẩm Sỉ`, tongSi]);
Object.entries(sxSi).sort((a, b) => {
  const indexA = LOAI_SX_ORDER.indexOf(a[0].toLowerCase());
  const indexB = LOAI_SX_ORDER.indexOf(b[0].toLowerCase());
  if (indexA !== -1 && indexB !== -1) return indexA - indexB;
  if (indexA !== -1) return -1;
  if (indexB !== -1) return 1;
  return a[0].localeCompare(b[0]);
}).forEach(([sx, slSX])=>{
  if(!sx || sx==="(Trống)") return;
  rowsRutGon.push([`   - ${sx}`, slSX]);
  const loaiHangBySX = {};
  duLieuSi.filter(d=>d.loaiSX===sx).forEach(d=>{
    if(!d.loaiHang) return;
    loaiHangBySX[d.loaiHang] = (loaiHangBySX[d.loaiHang]||0)+1;
  });
  Object.entries(loaiHangBySX).sort((a, b) => {
    const indexA = LOAI_HANG_ORDER.indexOf(a[0].toLowerCase());
    const indexB = LOAI_HANG_ORDER.indexOf(b[0].toLowerCase());
    if (indexA !== -1 && indexB !== -1) return indexA - indexB;
    if (indexA !== -1) return -1;
    if (indexB !== -1) return 1;
    return a[0].localeCompare(b[0]);
  }).forEach(([lh, slLH])=>{
    rowsRutGon.push([`      • ${lh}`, slLH]);
  });
});
rowsRutGon.push([]);

  // --- HÀM render nhóm "còn lại": tách theo từng đợt -> SX -> Loại hàng
  const renderNhomDayDot = (tieuDe, danhSachDot, tongNhom) => {
    rowsRutGon.push([`Tổng sản phẩm ${tieuDe}`, tongNhom]);
    danhSachDot.filter(n=>(groupDotHang[n]||0)>0).forEach(n=>{
      rowsRutGon.push([`   ${n}`, groupDotHang[n]]);
      // SX trong đợt n
      const bySX = {};
      dataSrc.filter(d=>d.dotHang===n).forEach(d=>{
        if(!d.loaiSX) return;
        bySX[d.loaiSX] = (bySX[d.loaiSX]||0)+1;
      });
      Object.entries(bySX).sort((a, b) => {
        const indexA = LOAI_SX_ORDER.indexOf(a[0].toLowerCase());
        const indexB = LOAI_SX_ORDER.indexOf(b[0].toLowerCase());
        if (indexA !== -1 && indexB !== -1) return indexA - indexB;
        if (indexA !== -1) return -1;
        if (indexB !== -1) return 1;
        return a[0].localeCompare(b[0]);
      }).forEach(([sx, slSX])=>{
        rowsRutGon.push([`      - ${sx}`, slSX]);
        // Loại hàng trong SX đó
        const byLH = {};
        dataSrc.filter(d=>d.dotHang===n && d.loaiSX===sx).forEach(d=>{
          if(!d.loaiHang) return;
          byLH[d.loaiHang] = (byLH[d.loaiHang]||0)+1;
        });
        Object.entries(byLH).sort((a, b) => {
          const indexA = LOAI_HANG_ORDER.indexOf(a[0].toLowerCase());
          const indexB = LOAI_HANG_ORDER.indexOf(b[0].toLowerCase());
          if (indexA !== -1 && indexB !== -1) return indexA - indexB;
          if (indexA !== -1) return -1;
          if (indexB !== -1) return 1;
          return a[0].localeCompare(b[0]);
        }).forEach(([lh, slLH])=>{
          rowsRutGon.push([`         • ${lh}`, slLH]);
        });
      });
    });
    rowsRutGon.push([]);
  };

  renderNhomDayDot("Khác", khacGroup, tongKhac);
  renderNhomDayDot("Lộn", lonGroup, tongLon);
  renderNhomDayDot("Lỗi", huGroup, tongHu);

  // Các khối tổng hợp còn lại
  rowsRutGon.push(["🛍️ Thống kê loại hàng:"]);
  Object.entries(group("loaiHang")).sort((a, b) => {
    const indexA = LOAI_HANG_ORDER.indexOf(a[0].toLowerCase());
    const indexB = LOAI_HANG_ORDER.indexOf(b[0].toLowerCase());
    if (indexA !== -1 && indexB !== -1) return indexA - indexB;
    if (indexA !== -1) return -1;
    if (indexB !== -1) return 1;
    return a[0].localeCompare(b[0]);
  }).forEach(([k,v])=>rowsRutGon.push([k,v]));
  rowsRutGon.push([]);
  rowsRutGon.push(["🏭 Thống kê loại SX:"]);
  Object.entries(group("loaiSX")).sort((a, b) => {
    const indexA = LOAI_SX_ORDER.indexOf(a[0].toLowerCase());
    const indexB = LOAI_SX_ORDER.indexOf(b[0].toLowerCase());
    if (indexA !== -1 && indexB !== -1) return indexA - indexB;
    if (indexA !== -1) return -1;
    if (indexB !== -1) return 1;
    return a[0].localeCompare(b[0]);
  }).forEach(([k,v])=>rowsRutGon.push([k,v]));
  rowsRutGon.push([]);
  rowsRutGon.push(["📊 Trạng thái:"]);
  Object.entries(group("trangThai")).forEach(([k,v])=>rowsRutGon.push([k,v]));

  // Sheet 3: Rút gọn với ExcelJS
  const wsRutGon = workbook.addWorksheet('Rut_gon');
  rowsRutGon.forEach(row => {
    const excelRow = wsRutGon.addRow(row);
    excelRow.eachCell((cell, colNumber) => {
      if (colNumber === 1) {
        applyCellStyle(cell, {
          horizontal: 'left',
          vertical: 'middle',
          wrapText: true,
          cleanValue: true
        });
      } else {
        applyCellStyle(cell, {
          horizontal: typeof row[1] === 'number' ? 'right' : 'left',
          vertical: 'middle',
          wrapText: true,
          indent: 0
        });
      }
    });
  });

  // Ẩn các dòng không có số lượng (cột 2 trống hoặc = 0) để rút gọn sheet Rut_gon
  try {
    for (let r = 1; r <= wsRutGon.rowCount; r++) {
      const row = wsRutGon.getRow(r);
      const c2 = row.getCell(2).value;
      let num = undefined;
      if (typeof c2 === 'number') {
        num = c2;
      } else if (c2 && typeof c2 === 'object' && 'result' in c2) {
        // Trường hợp công thức
        num = Number(c2.result);
      } else if (c2 !== null && c2 !== undefined && c2 !== '') {
        num = Number(c2);
      }
      if (num === undefined || !Number.isFinite(num) || num === 0) {
        row.hidden = true;
      }
    }
  } catch (e) { /* noop */ }

  // ====== Sheet 4: Pivot (giữ nguyên logic cũ) ======
  const sizes=["S","M","L","XL","XXL"];
  const pivot={};
  dataSrc.forEach(d=>{
    if(!d.loaiHang||!d.mau||!d.size) return;
    const loai=d.loaiHang,mau=d.mau,size=d.size.toUpperCase();
    if(!pivot[loai]) pivot[loai]={};
    if(!pivot[loai][mau]) pivot[loai][mau]={};
    pivot[loai][mau][size]=(pivot[loai][mau][size]||0)+1;
  });

  const rows=[["Loại hàng","Màu",...sizes,"Tổng SL"]];
  let tongTatCa=0;
  const loaiHangKeys = Object.keys(pivot);
  loaiHangKeys.forEach((loai, index)=>{
    // Sắp xếp màu theo số lượng giảm dần (từ lớn đến bé)
    const sortedMau = Object.keys(pivot[loai]).sort((mauA, mauB) => {
      let tongA = 0;
      let tongB = 0;
      sizes.forEach(sz => {
        tongA += pivot[loai][mauA][sz] || 0;
        tongB += pivot[loai][mauB][sz] || 0;
      });
      if (tongB !== tongA) {
        return tongB - tongA;
      }
      return mauA.localeCompare(mauB);
    });
    
    sortedMau.forEach(mau=>{
      const row=[loai,mau];
      let tongDong=0;
      sizes.forEach(sz=>{
        const sl=pivot[loai][mau][sz]||0;
        row.push(sl);
        tongDong+=sl;
      });
      row.push(tongDong);
      tongTatCa+=tongDong;
      rows.push(row);
    });
    
    // Thêm hàng trống để phân cách giữa các loại hàng (trừ loại hàng cuối cùng)
    if (index < loaiHangKeys.length - 1) {
      rows.push([]);
    }
  });
  rows.push([]);
  rows.push(["Tổng tất cả","","",...Array(sizes.length-1).fill(""),tongTatCa]);

  // Sheet 4: Pivot với ExcelJS
  const wsPivot = workbook.addWorksheet('Pivot');
  const pivotHeaderRow = wsPivot.addRow(rows[0]);
  pivotHeaderRow.font = { bold: true, color: { argb: 'FFFFFFFF' } };
  pivotHeaderRow.fill = {
    type: 'pattern',
    pattern: 'solid',
    fgColor: { argb: 'FF2196F3' }
  };
  pivotHeaderRow.height = 25;
  pivotHeaderRow.eachCell((cell) => {
    applyCellStyle(cell, {
      horizontal: 'center',
      vertical: 'middle',
      wrapText: true,
      font: { bold: true, color: { argb: 'FFFFFFFF' } }
    });
  });
  
  rows.slice(1).forEach((row, index) => {
    const excelRow = wsPivot.addRow(row);
    excelRow.eachCell((cell, colNumber) => {
      applyCellStyle(cell, {
        horizontal: colNumber > 2 && colNumber <= 2 + sizes.length ? 'center' : 
                   colNumber === 2 + sizes.length + 1 ? 'center' : 'left',
        vertical: 'middle',
        wrapText: true
      });
      if (index === rows.length - 2) {
        cell.font = { bold: true };
        cell.fill = {
          type: 'pattern',
          pattern: 'solid',
          fgColor: { argb: 'FFE3F2FD' }
        };
      }
    });
  });

  // Hàm helper để cố định hàng tiêu đề (freeze panes)
  const freezeHeaderRow = (worksheet) => {
    if (!worksheet) return;
    worksheet.views = [
      {
        state: 'frozen',
        ySplit: 1,
        topLeftCell: 'A2',
        activeCell: 'A2'
      }
    ];
  };

  // Tự động điều chỉnh độ rộng cột cho tất cả các sheet
  autoFitColumns(wsChiTiet);
  autoFitColumns(wsThongKe);
  autoFitColumns(wsRutGon);
  autoFitColumns(wsPivot);

  // Cố định hàng tiêu đề chỉ cho sheet Chi_tiet và Pivot
  freezeHeaderRow(wsChiTiet);
  freezeHeaderRow(wsPivot);
  // Sheet Chi_tiet và Rut_gon không cần cố định hàng tiêu đề

  // --- Ghi file ---
  let fileName = 'TongHop';
  if(tuNgayFilter || denNgayFilter) {
    if(tuNgayFilter && denNgayFilter) {
      const tuNgay = tuNgayFilter.replace(/-/g, '');
      const denNgay = denNgayFilter.replace(/-/g, '');
      fileName = `TongHop_${tuNgay}_${denNgay}`;
    } else if(tuNgayFilter) {
      const tuNgay = tuNgayFilter.replace(/-/g, '');
      fileName = `TongHop_tu_${tuNgay}`;
    } else if(denNgayFilter) {
      const denNgay = denNgayFilter.replace(/-/g, '');
      fileName = `TongHop_den_${denNgay}`;
    }
  } else {
    const ngay = new Date().toLocaleDateString('vi-VN').replace(/\//g, "-");
    fileName = `TongHop_${ngay}`;
  }
  const buffer = await workbook.xlsx.writeBuffer();
  const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${fileName}.xlsx`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  window.URL.revokeObjectURL(url);
  } catch(err) {
    console.error('Export Excel failed', err);
    alert('⚠️ Xuất Excel thất bại: ' + (err && err.message ? err.message : err));
  }
}

// Gắn listener an toàn (kể cả khi DOM thay đổi)
document.addEventListener('click', (e)=>{
  const target = e.target;
  if (!target) return;
  if (target.id === 'btnExport') {
    exportExcel();
  }
});

</script>
