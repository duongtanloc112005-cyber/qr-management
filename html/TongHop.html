<script>
let duLieu=[],soDongMoi=0,soDongCapNhat=0,tongSoCapNhat=0;
// ✅ Biến global để lưu mergedData cho hàm xemLichSuMa()
let mergedData = [];
let exportData=[];   // dữ liệu dùng để xuất Excel (khớp giao diện)

// 🔥 CACHE VÀ TỐI ƯU THỐNG KÊ
let statsCache = {
    data: null,
    dataHash: null,
    timestamp: null,
    cacheDuration: 3000 // Giảm cache duration xuống 3 giây để cập nhật nhanh hơn
};

// Hàm tạo hash nhanh cho dữ liệu để kiểm tra thay đổi
function createDataHash() {
    // Hash dựa trên số lượng sản phẩm trong các module và filter ngày
    return `${presenceMaps.khophoi.size}_${presenceMaps.sanxuat.size}_${presenceMaps.thanhpham.size}_${presenceMaps.donghang.size}_${presenceMaps.hangsan.size}_${presenceMaps.hangton.size}_${tuNgayFilter}_${denNgayFilter}`;
}

// Danh sách loại hàng cố định theo thứ tự
const LOAI_HANG_ORDER = ['tee', 'boxy', 'scc', 'skk', 'hd', 'zip', 'swt', 'bb', 'polo', 'khác'];

// Danh sách loại sản xuất cố định theo thứ tự
const LOAI_SX_ORDER = ['in', 'kt', 'theu', 'dtg', 'khác'];
let dayChuyenFilter="",dotHangFilter="",loaiHangFilter="",loaiSXFilter="",trangThaiFilter="";
let tuNgayFilter="",denNgayFilter=""; // Filter theo thời gian
// Đã bỏ missingDataCache - các bộ phận độc lập

// Bản đồ hiện diện theo bộ phận (maGoc -> boolean)
const presenceMaps = {
  khophoi: new Set(),
  sanxuat: new Set(),
  thanhpham: new Set(),
  donghang: new Set(),
  hangsan: new Set(),   // Thêm dòng này
  hangton: new Set()    // Thêm dòng này
};

// Lưu dotHang của từng bộ phận để thống kê chéo 6 bộ phận
const moduleDots = {
  khophoi: {},
  sanxuat: {},
  thanhpham: {},
  hangsan: {},
  hangton: {},
  donghang: {}
};

// Lưu toàn bộ dữ liệu của từng module để tính toán thống kê
const moduleData = {
  khophoi: [],
  sanxuat: [],
  thanhpham: [],
  hangsan: [],
  hangton: [],
  donghang: []
};

// Lưu thời gian theo bộ phận (thời điểm bộ phận thêm sản phẩm)
const moduleTimes = {
  khophoi: new Map(),
  sanxuat: new Map(),
  thanhpham: new Map(),
  donghang: new Map(),
  hangsan: new Map(),
  hangton: new Map()
};

// 🔥 TỐI ƯU HÀM LOAD PRESENCE MAPS VỚI CACHE
let presenceMapsCache = {
  data: null,
  timestamp: null,
  cacheDuration: 2000 // Giảm cache duration xuống 2 giây để cập nhật nhanh hơn
};

async function loadPresenceMaps(forceRefresh = false) {
  // Kiểm tra cache - nếu còn trong thời gian cache và không force refresh, dùng cache
  const now = Date.now();
  if (!forceRefresh && presenceMapsCache.data !== null && presenceMapsCache.timestamp !== null) {
    const cacheAge = now - presenceMapsCache.timestamp;
    if (cacheAge < presenceMapsCache.cacheDuration) {
      // Cache còn hiệu lực, không cần load lại
      return Promise.resolve();
    }
  }
  
  try {
    const startTime = performance.now();
    const modules = ['khophoi','sanxuat','thanhpham','donghang','hangsan','hangton']; // Thêm đủ các module
    const results = await Promise.all(modules.map(m => fetch(`/api/${m}`).then(r=>r.ok?r.json():[]).catch(()=>[])));
    
    // Tối ưu: Sử dụng for loop thay vì forEach
    for (let idx = 0; idx < modules.length; idx++) {
      const m = modules[idx];
      presenceMaps[m].clear();
      if (moduleTimes[m]) moduleTimes[m].clear();
      if (moduleDots[m]) moduleDots[m] = {};
      moduleData[m] = []; // Reset dữ liệu module
      
      let arr = [];
      if (Array.isArray(results[idx])) arr = results[idx];
      else if (results[idx] && Array.isArray(results[idx].data)) arr = results[idx].data;
      
      // Tối ưu: Sử dụng for loop thay vì forEach
      const arrLength = arr.length;
      for (let i = 0; i < arrLength; i++) {
        const p = arr[i];
        if (!p) continue;
        const key = (p.maGoc || p.ma || '').toString().trim();
        if (!key) continue;
        presenceMaps[m].add(key);
        const tg = p.thoiGian || p.time || p.createdAt || p.ngayGio || '';
        if (tg && moduleTimes[m]) moduleTimes[m].set(key, tg);
        if (moduleDots[m] !== undefined) {
          moduleDots[m][key] = (p.dotHang || '').toString().trim().toLowerCase();
        }
        // Lưu toàn bộ dữ liệu để tính toán thống kê
        if (moduleData[m] !== undefined) {
          moduleData[m].push(p);
        }
      }
    }
    
    // Cập nhật cache
    presenceMapsCache.data = results;
    presenceMapsCache.timestamp = now;
    
    // Invalid cache khi dữ liệu thay đổi
    statsCache.dataHash = null;
    statsCache.data = null;
    
    const endTime = performance.now();
    const totalLoaded = results.reduce((sum, r) => {
      const arr = Array.isArray(r) ? r : (Array.isArray(r?.data) ? r.data : []);
      return sum + arr.length;
    }, 0);
    
    if (totalLoaded > 1000) {
      console.log(`⚡ Loaded ${totalLoaded} products in ${(endTime - startTime).toFixed(2)}ms`);
    }
  } catch(e) { 
    console.error('Load presence failed', e);
    // Invalid cache khi có lỗi
    statsCache.dataHash = null;
    statsCache.data = null;
    presenceMapsCache.data = null;
    presenceMapsCache.timestamp = null;
  }
}

function renderDepartmentStatus(maGoc){
  const ok = '✅';
  const no = '❌';
  const kpPresent = presenceMaps.khophoi.has(maGoc);
  const sxPresent = presenceMaps.sanxuat.has(maGoc);
  const tpPresent = presenceMaps.thanhpham.has(maGoc);
  const dhPresent = presenceMaps.donghang.has(maGoc);
  const kp = kpPresent ? ok : no;
  const sx = sxPresent ? ok : no;
  const tp = tpPresent ? ok : no;
  const dh = dhPresent ? ok : no;
  return `<div class="dept-status">
    <span class="dept-pill kp"><span>KP</span> ${kp}</span>
    <span class="dept-pill sx"><span>SX</span> ${sx}</span>
    <span class="dept-pill tp"><span>TP</span> ${tp}</span>
    <span class="dept-pill dh"><span>ĐH</span> ${dh}</span>
  </div>`;
}

// Xác định dây chuyền hiển thị từ mã sản phẩm
function getProductChain(item){
  const code = (item.ma || item.maGoc || '').toLowerCase();
  const isHS = code.startsWith('hssp') || code.startsWith('hs');
  const isHT = code.startsWith('htsp') || code.startsWith('ht');
  if (isHS) return 'HS-ĐH';
  if (isHT) return 'HT-ĐH';
  return 'KP-SX-TP-ĐH';
}

// Suy ra Đợt hàng / Loại hàng / Loại SX từ mã sản phẩm
function deriveFieldsFromCode(maString){
  const result = { dotHang: '', loaiHang: '', loaiSX: '' };
  if (!maString || typeof maString !== 'string') return result;
  const base = maString.trim();
  // Lấy phần trước dấu '|' đầu tiên
  const leftOfPipe = base.split('|')[0];
  // dotHang: trước dấu '='
  if (leftOfPipe.includes('=')) {
    const partsEq = leftOfPipe.split('=');
    result.dotHang = (partsEq[0] || '').trim().toLowerCase();
    // phần sau '=' để bóc tách loaiHang-loaiSX
    const afterEq = (partsEq[1] || '').trim();
    if (afterEq.includes('-')) {
      const idx = afterEq.indexOf('-');
      result.loaiHang = afterEq.substring(0, idx).trim().toLowerCase();
      // loaiSX nằm giữa '-' và '|', hiện tại ta đã cắt trước '|'
      result.loaiSX = afterEq.substring(idx + 1).trim().toLowerCase();
    }
  }
  return result;
}

// 🔥 TỐI ƯU: Tự động cập nhật trạng thái hoàn thành theo dây chuyền
function autoUpdateStatuses(items){
  let changed = false;
  if (!items || items.length === 0) return false;
  
  // Tối ưu: Sử dụng for loop thay vì forEach
  const itemsLength = items.length;
  for (let i = 0; i < itemsLength; i++) {
    const item = items[i];
    if (!item) continue;
    // Bỏ qua nếu đã hoàn thành
    if (item.trangThai === 'Hoàn thành') continue;
    const id = item.maGoc;
    const code = (item.ma || item.maGoc || '').toLowerCase();
    // Xác định dây chuyền: HS, HT, mặc định KP
    const isHS = code.startsWith('hs');
    const isHT = code.startsWith('ht');
    // Điều kiện đủ theo dây chuyền
    let done = false;
    if (isHS) {
      done = presenceMaps.hangsan.has(id) && presenceMaps.donghang.has(id);
    } else if (isHT) {
      done = presenceMaps.hangton.has(id) && presenceMaps.donghang.has(id);
    } else {
      // Chỉ hoàn thành khi có đầy đủ hiện diện thực tế từ các bộ phận
      // KHÔNG cần theo thứ tự thêm sản phẩm - chỉ cần đảm bảo có đủ 4 bộ phận (KP, SX, TP, ĐH)
      done = presenceMaps.khophoi.has(id) && presenceMaps.sanxuat.has(id) && presenceMaps.thanhpham.has(id) && presenceMaps.donghang.has(id);
    }
    if (done) {
      item.trangThai = 'Hoàn thành';
      if (!item.lichSu) item.lichSu = [];
      item.lichSu.push({ thoiGian: new Date().toLocaleString(), trangThai: 'Hoàn thành' });
      changed = true;
    }
  }
  return changed;
}

    const row = event.target.closest('tr');
    const passwordCell = row.querySelector('td:nth-child(2)');
    const passwordInput = passwordCell.querySelector('input');

        passwordInput.removeAttribute('readonly');
        passwordInput.style.background = '#fff';
        event.target.textContent = '💾 Lưu';

// WebSocket functions
function initWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}`;
    
    try {
        ws = new WebSocket(wsUrl);
        
        ws.onopen = function() {
            console.log('WebSocket connected');
            isConnected = true;
            updateConnectionStatus('online');
            
            // Đăng ký module - kiểm tra trạng thái trước khi gửi
            if (ws.readyState === WebSocket.OPEN) {
                // Đăng ký với module chính (tonghop)
                ws.send(JSON.stringify({
                    type: 'register',
                    module: MODULE_NAME
                }));
            }
        };
        
        ws.onmessage = function(event) {
            try {
                const data = JSON.parse(event.data);
                
                if (data.type === 'sync' && data.module === MODULE_NAME) {
                    // Nhận dữ liệu đồng bộ từ server
                    duLieu = data.data || [];
                    
                    // 🔥 TỐI ƯU: Invalid cache khi nhận dữ liệu mới
                    statsCache.dataHash = null;
                    statsCache.data = null;
                    presenceMapsCache.data = null;
                    presenceMapsCache.timestamp = null;
                    
                    // Render với requestIdleCallback để không block UI
                    const scheduleUpdate = (callback) => {
                      if (window.requestIdleCallback) {
                        requestIdleCallback(callback, { timeout: 100 });
                      } else {
                        requestAnimationFrame(callback);
                      }
                    };
                    
                    scheduleUpdate(() => {
                      hienThiImmediate();
                    });
                    console.log('Data synced from server');
                } else if (data.type === 'pong') {
                    // Ping response
                    console.log('Pong received');
                }
            } catch (error) {
                console.error('Error parsing WebSocket message:', error);
            }
        };
        
        ws.onclose = function() {
            console.log('WebSocket disconnected');
            isConnected = false;
            updateConnectionStatus('offline');
            
            // Thử kết nối lại sau 3 giây
            setTimeout(initWebSocket, 3000);
        };
        
        ws.onerror = function(error) {
            console.error('WebSocket error:', error);
            updateConnectionStatus('error');
        };
        
    } catch (error) {
        console.error('Failed to create WebSocket connection:', error);
        updateConnectionStatus('error');
    }
}

// Hàm render dữ liệu từng batch để tránh đơ UI
function renderDataInBatches(data, startIndex, shouldRestoreScroll = false) {
  // 🔥 TỐI ƯU: Với <= 100 items, render trực tiếp không batch để tránh lag
  // Chỉ batch render khi > 100 items
  let BATCH_SIZE;
  if (data.length <= 100) {
    // Render tất cả cùng lúc cho <= 100 items (không batch)
    BATCH_SIZE = data.length;
  } else if (itemsPerPage >= 200) {
    BATCH_SIZE = 50; // Tăng batch size cho hiệu suất tốt hơn
  } else if (itemsPerPage >= 100) {
    BATCH_SIZE = 75; // Tăng batch size cho 100+ items
  } else if (data.length > 3000) {
    BATCH_SIZE = 50; // Tăng batch size
  } else if (data.length > 2000) {
    BATCH_SIZE = 60; // Tăng batch size
  } else if (data.length > 1000) {
    BATCH_SIZE = 75; // Tăng batch size
  } else {
    BATCH_SIZE = data.length; // Render tất cả nếu ít
  }
  
  const endIndex = Math.min(startIndex + BATCH_SIZE, data.length);
  const tbody = document.getElementById("tbody");
  const loadingIndicator = document.getElementById("loadingIndicator");
  let stt = startIndex + 1;
  
  // Chỉ hiển thị loading indicator khi batch render (không hiển thị cho render trực tiếp)
  if (startIndex === 0 && data.length > 100 && BATCH_SIZE < data.length) {
    loadingIndicator.style.display = 'block';
    loadingIndicator.innerHTML = `
      <div class="loading-spinner"></div>
      <div>Đang tải dữ liệu... (${data.length} dòng)</div>
      <div style="font-size: 12px; margin-top: 5px;">Đã tải: ${startIndex}/${data.length}</div>
    `;
  } else {
    // Ẩn loading indicator khi render trực tiếp hoặc không cần
    loadingIndicator.style.display = 'none';
  }
  
  // 🔥 TỐI ƯU: Tạo Map một lần duy nhất thay vì findIndex nhiều lần (O(n*m) -> O(n+m))
  // Chỉ tạo map nếu chưa có hoặc đã thay đổi (cache map)
  if (!window._maGocToIndexMap || window._duLieuLength !== duLieu.length) {
    window._maGocToIndexMap = new Map();
    for (let idx = 0; idx < duLieu.length; idx++) {
      const maGoc = duLieu[idx]?.maGoc;
      if (maGoc) {
        window._maGocToIndexMap.set(maGoc, idx);
      }
    }
    window._duLieuLength = duLieu.length;
  }
  
  // Tìm index gốc trong duLieu sử dụng Map (nhanh hơn nhiều)
  const originalIndices = new Array(endIndex - startIndex);
  for (let i = startIndex; i < endIndex; i++) {
    originalIndices[i - startIndex] = window._maGocToIndexMap.get(data[i]?.maGoc) ?? -1;
  }
  
  // Tính STT dựa trên trang hiện tại
  const globalStartIndex = (currentPage - 1) * itemsPerPage;
  
  // Sử dụng DocumentFragment để thêm nhiều element cùng lúc, tránh cuộn nhảy
  // Tối ưu: Pre-allocate fragment với ước tính số lượng
  const fragment = document.createDocumentFragment();
  fragment.reserve = endIndex - startIndex; // Hint cho browser (không phải API chính thức nhưng giúp tối ưu)
  
  // Lưu vị trí cuộn trước khi render (chỉ một lần cho toàn bộ batch)
  const tabData = document.getElementById("tab-data");
  const isTabActive = tabData && tabData.classList.contains('active');
  let scrollBeforeBatch = null;
  
  if (isTabActive && !isRestoringScroll && startIndex === 0) {
    // Lưu scroll position từ window/documentElement (scroll chính của trang)
    scrollBeforeBatch = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
  }
  
  for (let i = startIndex; i < endIndex; i++) {
    const item = data[i];
    const originalIndex = originalIndices[i - startIndex]; // Sửa index vì originalIndices chỉ chứa từ startIndex
    const globalStt = globalStartIndex + i + 1;
    
    // Nhận diện dây chuyền từ mã sản phẩm
    const maGoc = item.maGoc || '';
    const maNguon = (item.ma || item.maGoc || "").toLowerCase();

      tr.style.backgroundColor = '#fff'; // trắng cho Hàng Sản
      labelDayChuyen = '<span style="font-weight:bold;color:#e65100;margin-left:6px;">HS ĐH</span>';
    } else if(maNguon.startsWith('ht')) {
      tr.style.backgroundColor = '#fff'; // trắng cho Hàng Tồn
      labelDayChuyen = '<span style="font-weight:bold;color:#0277bd;margin-left:6px;">HT ĐH</span>';
    } else if(maNguon.startsWith('kp')) {
      tr.style.backgroundColor = '#fff'; // trắng cho Kho phôi
      labelDayChuyen = '<span style="font-weight:bold;color:#8e24aa;margin-left:6px;">KP</span>';
    } else {
      // Dây chuyền chính: 4 bộ phận (KP, SX, TP, ĐH) - KHÔNG cần theo thứ tự thêm sản phẩm
    }
    const classTrangThai = (item.trangThai || "").replace(/\s+/g,'');
    
    // Thêm class và style cho sản phẩm đã hoàn thành
    if (item.trangThai === 'Hoàn thành') {
      tr.classList.add('completed-row');
    }
    
    // Xác định trạng thái: Hoàn thành hoặc Chưa hoàn thành
    // Logic: Kiểm tra xem sản phẩm có đủ ở tất cả bộ phận trong dây chuyền không
    let isHoanThanhFullChain = false;
    const isHS = maNguon.startsWith('hssp') || maNguon.startsWith('hs');
    const isHT = maNguon.startsWith('htsp') || maNguon.startsWith('ht');
    
    if (isHS) {
      // Dây chuyền HS -> ĐH: Hoàn thành nếu có đủ ở HS và ĐH
      isHoanThanhFullChain = presenceMaps.hangsan.has(maGoc) && presenceMaps.donghang.has(maGoc);
    } else if (isHT) {
      // Dây chuyền HT -> ĐH: Hoàn thành nếu có đủ ở HT và ĐH
      isHoanThanhFullChain = presenceMaps.hangton.has(maGoc) && presenceMaps.donghang.has(maGoc);
    } else {
      // Dây chuyền chính: Hoàn thành nếu có đủ ở tất cả 4 bộ phận (KP, SX, TP, ĐH)
      // KHÔNG cần theo thứ tự thêm sản phẩm - chỉ cần đảm bảo có đủ 4 bộ phận
      isHoanThanhFullChain = presenceMaps.khophoi.has(maGoc) &&
                             presenceMaps.sanxuat.has(maGoc) &&
                             presenceMaps.thanhpham.has(maGoc) &&
                             presenceMaps.donghang.has(maGoc);
    }
    
    // Xác định trạng thái hiển thị
    let displayStatus, displayClass;
    if (isHoanThanhFullChain) {
      displayStatus = 'Hoàn thành';
      displayClass = 'Hoànthành';
    } else {
      displayStatus = 'Chưa hoàn thành';
      displayClass = 'Chưahoànthành';
    }
    
    // 🔥 TỐI ƯU: Cache kết quả has() để tránh gọi nhiều lần
    // Nhận diện dây chuyền theo tiền tố mã: HS -> HS-ĐH, HT -> HT-ĐH, còn lại KP-SX-TP-ĐH
    let deptCustomHtml = '';
    
    if (isHS) {
      const hasHS = presenceMaps.hangsan.has(maGoc);
      const hasDH = presenceMaps.donghang.has(maGoc);
      deptCustomHtml = `<span class="dept-pill hs">HS ${hasHS ? '✅' : '❌'}</span> <span class="dept-pill dh">ĐH ${hasDH ? '✅' : '❌'}</span>`;
    } else if (isHT) {
      const hasHT = presenceMaps.hangton.has(maGoc);
      const hasDH = presenceMaps.donghang.has(maGoc);
      deptCustomHtml = `<span class="dept-pill ht">HT ${hasHT ? '✅' : '❌'}</span> <span class="dept-pill dh">ĐH ${hasDH ? '✅' : '❌'}</span>`;
    } else {
      const hasKP = presenceMaps.khophoi.has(maGoc);
      const hasSX = presenceMaps.sanxuat.has(maGoc);
      const hasTP = presenceMaps.thanhpham.has(maGoc);
      const hasDH = presenceMaps.donghang.has(maGoc);
      deptCustomHtml = `<span class="dept-pill kp">KP ${hasKP ? '✅' : '❌'}</span> <span class="dept-pill sx">SX ${hasSX ? '✅' : '❌'}</span> <span class="dept-pill tp">TP ${hasTP ? '✅' : '❌'}</span> <span class="dept-pill dh">ĐH ${hasDH ? '✅' : '❌'}</span>`;
    }
    
    // 🔥 TỐI ƯU: Escape HTML và cache giá trị để tránh tính toán lại
    const maGocEscaped = (item.maGoc || '').replace(/'/g, "&#39;").replace(/"/g, "&quot;");
    const ghiChuEscaped = (item.ghiChu || '').replace(/"/g, "&quot;");
    const dotHangVal = item.dotHang || "";
    const loaiHangVal = item.loaiHang || "";
    const loaiSXVal = item.loaiSX || "";
    const thoiGianVal = moduleTimes.donghang.get(maGoc) || item.thoiGian || "";
    
    // Trạng thái tự động, không cần dropdown - chỉ hiển thị text
    tr.innerHTML = `<td><input type='checkbox' class='row-check' data-index='${originalIndex}'></td>
    <td>${globalStt}</td>
    <td>
      <span>${item.maGoc}</span>
      <button title="Copy" class="btn-copy-ma" data-ma="${maGocEscaped.replace(/"/g, '&quot;')}" onclick="event.stopPropagation(); event.stopImmediatePropagation(); event.preventDefault(); return handleCopyClick(this, event);" style="margin-left:6px;padding:2px 6px;border:1px solid #ccc;background:#f5f5f5;border-radius:4px;cursor:pointer;">📋</button>
    </td>
    <td>${deptCustomHtml}</td>
    <td><span class="status-cell status-${displayClass}" style="font-weight:bold;padding:2px 6px;border-radius:4px;">${displayStatus}</span></td>
    <td>${dotHangVal}</td>
    <td>${loaiHangVal}</td>
    <td>${loaiSXVal}</td>
    <td>${thoiGianVal}</td>
    <td><input type="text" value="${ghiChuEscaped}" onchange="capNhatGhiChu(${originalIndex}, this.value)" placeholder="Nhập ghi chú"></td>
    <td><button class="btn-xem-lich-su" data-ma="${maGocEscaped.replace(/"/g, '&quot;')}" onclick="event.stopPropagation(); event.stopImmediatePropagation(); event.preventDefault(); return handleXemLichSuClick(this, event);">📜</button></td>
    `;
    
    // Thêm vào fragment thay vì appendChild trực tiếp
    fragment.appendChild(tr);
  }
  
  // Thêm tất cả các element cùng lúc vào DOM (chỉ một lần reflow)
  // Tối ưu: Append trực tiếp fragment (nhanh hơn requestAnimationFrame cho batch lớn)
  tbody.appendChild(fragment);
  
  // Khôi phục vị trí cuộn sau khi thêm xong batch (chỉ khi render batch đầu tiên và còn batch tiếp theo)
  // Chỉ khôi phục nếu đang trong quá trình render batch (chưa xong)
  // TỐI ƯU: Chỉ restore một lần khi render xong batch đầu tiên, không restore trong từng batch
  // (Đã loại bỏ để tránh giật - sẽ chỉ restore một lần ở cuối)
  
  // Cập nhật progress trong loading indicator
  if (loadingIndicator.style.display === 'block') {
    loadingIndicator.innerHTML = `
      <div class="loading-spinner"></div>
      <div>Đang tải dữ liệu... (${data.length} dòng)</div>
      <div style="font-size: 12px; margin-top: 5px;">Đã tải: ${endIndex}/${data.length}</div>
    `;
  }
  
  // Nếu còn dữ liệu, tiếp tục render batch tiếp theo (chỉ khi batch render)
  if (endIndex < data.length && BATCH_SIZE < data.length) {
    // Sử dụng requestIdleCallback nếu có, fallback về requestAnimationFrame
    const scheduleNextBatch = (callback) => {
      if (window.requestIdleCallback) {
        requestIdleCallback(callback, { timeout: 16 }); // Timeout 16ms để đảm bảo chạy trong frame
      } else {
        requestAnimationFrame(() => {
          setTimeout(callback, 0); // Delay 0ms để yield cho browser
        });
      }
    };
    
    scheduleNextBatch(() => {
      renderDataInBatches(data, endIndex, shouldRestoreScroll);
    });
  } else {
    // Ẩn loading indicator khi hoàn thành
    loadingIndicator.style.display = 'none';
    
    // Thêm event listener cho các button copy và xem lịch sử (event delegation)
    setupButtonEventListeners();
    
    // TỐI ƯU: Khôi phục vị trí cuộn chỉ một lần khi render xong hoàn toàn và người dùng không đang cuộn
    if (shouldRestoreScroll && savedScrollPosition !== null && savedScrollPosition > 0 && !isRestoringScroll && !isUserScrolling) {
      isRestoringScroll = true;
      const tabData = document.getElementById("tab-data");
      const isTabActive = tabData && tabData.classList.contains('active');
      
      // Chỉ restore một lần sau khi DOM đã render xong
      requestAnimationFrame(() => {
        if (isTabActive && savedScrollPosition !== null && savedScrollPosition > 0 && !isUserScrolling) {
          // Scroll một lần duy nhất với instant behavior để tránh giật
          const scrollEl = window.pageYOffset !== undefined ? window : document.documentElement;
          scrollEl.scrollTop = savedScrollPosition;
          
          // Reset sau một frame
          requestAnimationFrame(() => {
            isRestoringScroll = false;
            savedScrollPosition = null;
          });
        } else {
          isRestoringScroll = false;
          savedScrollPosition = null;
        }
      });
    }
  }
}

// Setup event listeners cho các button copy và xem lịch sử (chỉ thêm một lần)
let buttonListenersSetup = false;
function setupButtonEventListeners() {
  if (buttonListenersSetup) return; // Đã setup rồi, không cần setup lại
  buttonListenersSetup = true;
  
  // ✅ Event delegation với capture phase để bắt event TRƯỚC TẤT CẢ các listener khác
  // Xử lý CẢ HAI button (xem lịch sử và copy) với priority cao nhất
  document.addEventListener('click', function(e) {
    const target = e.target;
    if (!target) return;
    
    // ✅ Tìm button xem lịch sử (có thể là target hoặc parent)
    let btnLichSu = null;
    if (target.classList && target.classList.contains('btn-xem-lich-su')) {
      btnLichSu = target;
    } else if (target.closest) {
      btnLichSu = target.closest('.btn-xem-lich-su');
    }
    
    if (btnLichSu) {
      // ✅ Chặn NGAY LẬP TỨC để không bị listener khác xử lý
      e.stopImmediatePropagation();
      e.stopPropagation();
      e.preventDefault();
      
      const maGoc = btnLichSu.getAttribute('data-ma');
      if (maGoc) {
        // Decode HTML entities
        const temp = document.createElement('div');
        temp.innerHTML = maGoc;
        const decodedMa = temp.textContent || temp.innerText || maGoc;
        // Gọi hàm xem lịch sử
        xemLichSuMa(decodedMa);
      }
      return false;
    }
    
    // ✅ Tìm button copy (có thể là target hoặc parent)
    let btnCopy = null;
    if (target.classList && target.classList.contains('btn-copy-ma')) {
      btnCopy = target;
    } else if (target.closest) {
      btnCopy = target.closest('.btn-copy-ma');
    }
    
    if (btnCopy) {
      // ✅ Chặn NGAY LẬP TỨC để không bị listener khác xử lý
      e.stopImmediatePropagation();
      e.stopPropagation();
      e.preventDefault();
      
      const maGoc = btnCopy.getAttribute('data-ma');
      if (maGoc) {
        // Decode HTML entities
        const temp = document.createElement('div');
        temp.innerHTML = maGoc;
        const decodedMa = temp.textContent || temp.innerText || maGoc;
        // Gọi hàm copy
        copyMa(decodedMa, btnCopy);
      }
      return false;
    }
  }, true); // ✅ Capture phase - bắt event TRƯỚC TẤT CẢ các listener khác
}

// Copy mã sản phẩm vào clipboard
function copyMa(text, btn){
  try {
    const toCopy = (text || '').toString();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(toCopy).then(()=>{
        if (btn) { btn.textContent = '✅'; setTimeout(()=>{ btn.textContent = '📋'; }, 1000); }
      }).catch(() => {
        // Fallback nếu clipboard API thất bại
        const temp = document.createElement('textarea');
        temp.value = toCopy;
        temp.style.position = 'fixed';
        temp.style.opacity = '0';
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
        if (btn) { btn.textContent = '✅'; setTimeout(()=>{ btn.textContent = '📋'; }, 1000); }
      });
    } else {
      const temp = document.createElement('textarea');
      temp.value = toCopy;
      temp.style.position = 'fixed';
      temp.style.opacity = '0';
      document.body.appendChild(temp);
      temp.select();
      document.execCommand('copy');
      document.body.removeChild(temp);
      if (btn) { btn.textContent = '✅'; setTimeout(()=>{ btn.textContent = '📋'; }, 1000); }
    }
  } catch(e) { 
    console.warn('Copy failed', e);
    alert('⚠️ Không thể copy mã sản phẩm. Vui lòng thử lại.');
  }
}

// Biến lưu vị trí cuộn cần khôi phục
let savedScrollPosition = null;
let isRestoringScroll = false;
let lastFilterStateForScroll = null; // Lưu filter state để so sánh
let isUserScrolling = false; // Flag để phát hiện người dùng đang cuộn
let scrollTimeout = null; // Timeout để reset flag sau khi người dùng ngừng cuộn

// Theo dõi khi người dùng cuộn thủ công - tránh restore scroll khi đang cuộn
// Sử dụng passive listener để tối ưu performance
const scrollListener = throttle(() => {
  if (!isRestoringScroll) {
    isUserScrolling = true;
    clearTimeout(scrollTimeout);
    // Reset flag sau 150ms khi người dùng ngừng cuộn (giảm từ 200ms)
    scrollTimeout = setTimeout(() => {
      isUserScrolling = false;
    }, 150);
  }
}, 16); // Throttle 16ms (~60fps)

// Hàm render với pagination
function renderWithPagination() {
  // Lưu vị trí cuộn hiện tại trước khi render (chỉ khi đang ở tab-data và không phải filter thay đổi)
  const tabData = document.getElementById("tab-data");
  const isTabActive = tabData && tabData.classList.contains('active');
  
  // Kiểm tra filter state để quyết định có khôi phục cuộn không
  const tuKhoa = document.getElementById("tuKhoa")?.value.trim().toLowerCase() || '';
  const selectedTrangThai = document.getElementById('filterTrangThai')?.value || '';
  const selectedDotHang = document.getElementById('filterDotHang')?.value || '';
  const selectedLoaiHang = document.getElementById('filterLoaiHang')?.value || '';
  const selectedLoaiSX = document.getElementById('filterLoaiSX')?.value || '';
  const selectedDayChuyen = document.getElementById('filterDayChuyen')?.value || '';
  const currentFilterState = `${tuKhoa}_${selectedTrangThai}_${selectedDotHang}_${selectedLoaiHang}_${selectedLoaiSX}_${selectedDayChuyen}_${tuNgayFilter}_${denNgayFilter}`;
  
  const filterChanged = currentFilterState !== lastFilterStateForScroll;
  lastFilterStateForScroll = currentFilterState;
  
  // Chỉ lưu vị trí cuộn nếu filter không thay đổi và người dùng không đang cuộn
  if (isTabActive && !isRestoringScroll && !filterChanged && !isUserScrolling) {
    // Lấy vị trí cuộn từ window/documentElement (scroll chính của trang)
    savedScrollPosition = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
  } else if (filterChanged || isUserScrolling) {
    // Filter thay đổi hoặc người dùng đang cuộn, reset vị trí cuộn
    savedScrollPosition = null;
  }
  
  const totalPages = Math.ceil(filteredData.length / itemsPerPage);
  const startIndex = (currentPage - 1) * itemsPerPage;
  const endIndex = Math.min(startIndex + itemsPerPage, filteredData.length);
  const pageData = filteredData.slice(startIndex, endIndex);
  
  // Cập nhật pagination controls
  updatePaginationControls(totalPages);
  
  // Dọn bảng trước khi render trang mới
  // Lưu vị trí cuộn trước khi clear tbody (nếu filter không thay đổi)
  const tbody = document.getElementById("tbody");
  let scrollBeforeClear = null;
  
  if (isTabActive && !filterChanged && !isRestoringScroll) {
    // Lấy scroll position từ window/documentElement (scroll chính của trang)
    scrollBeforeClear = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
    // Nếu không có vị trí cuộn được lưu, lấy từ hiện tại
    if (!savedScrollPosition && scrollBeforeClear > 0) {
      savedScrollPosition = scrollBeforeClear;
    }
  }
  
  if (tbody) {
    // Tối ưu: Sử dụng requestAnimationFrame để batch DOM updates
    requestAnimationFrame(() => {
      // Tạm thời ẩn tbody để tránh cuộn nhảy khi clear
      const originalDisplay = tbody.style.display;
      tbody.style.display = 'none';
      tbody.innerHTML = "";
      // Khôi phục display ngay sau khi clear
      tbody.style.display = originalDisplay || '';
    });
  }
  
  // Render dữ liệu trang hiện tại (đảm bảo presence đã tải)
  // Chỉ khôi phục cuộn nếu filter không thay đổi và không phải khi thay đổi itemsPerPage
  const shouldRestore = !filterChanged && savedScrollPosition !== null && !isRestoringScroll;
  
  // Tối ưu: Sử dụng requestIdleCallback nếu có
  const scheduleRender = (callback) => {
    if (window.requestIdleCallback && pageData.length > 50) {
      requestIdleCallback(callback, { timeout: 50 });
    } else {
      requestAnimationFrame(callback);
    }
  };
  
  scheduleRender(() => {
    renderDataInBatches(pageData, 0, shouldRestore);
  });
}

// Cập nhật pagination controls
function updatePaginationControls(totalPages) {
  const prevButton = document.getElementById("prevBtn");
  const nextButton = document.getElementById("nextBtn");
  const pageNumbers = document.getElementById("pageNumbers");
  
  // Cập nhật nút Previous/Next
  prevButton.disabled = currentPage <= 1;
  nextButton.disabled = currentPage >= totalPages;
  
  // Cập nhật số trang
  let pageNumbersHtml = "";
  const maxVisiblePages = 5;
  let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
  let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
  
  if (endPage - startPage + 1 < maxVisiblePages) {
    startPage = Math.max(1, endPage - maxVisiblePages + 1);
  }
  
  for (let i = startPage; i <= endPage; i++) {
    pageNumbersHtml += `<button onclick="goToPage(${i})" ${i === currentPage ? 'style="background:#2196F3;color:white;"' : ''}>${i}</button> `;
  }
  pageNumbers.innerHTML = pageNumbersHtml;
}

// Thay đổi trang
function changePage(direction) {
  const totalPages = Math.ceil(filteredData.length / itemsPerPage);
  const newPage = currentPage + direction;
  
  if (newPage >= 1 && newPage <= totalPages) {
    currentPage = newPage;
    renderWithPagination();
  }
}

// Đi đến trang cụ thể
function goToPage(page) {
  const totalPages = Math.ceil(filteredData.length / itemsPerPage);
  if (page >= 1 && page <= totalPages) {
    currentPage = page;
    renderWithPagination();
  }
}

// Thay đổi số dòng mỗi trang
function changeItemsPerPage() {
  const newItemsPerPage = parseInt(document.getElementById("itemsPerPageSelect").value);
  // Reset scroll position và flag khi thay đổi itemsPerPage để tránh giật
  savedScrollPosition = null;
  isUserScrolling = false;
  isRestoringScroll = false;
  itemsPerPage = newItemsPerPage;
  currentPage = 1;
  // Scroll lên đầu trang ngay lập tức để tránh giật
  window.scrollTo({ top: 0, behavior: 'instant' });
  // Render với debounce nhỏ
  requestAnimationFrame(() => {
    renderWithPagination();
  });
}

function renderGroup(title,group){
  let html=`<div class='stat-cell'><h4>${title}</h4>`;
  html+=`<table class="stat-table">`;
  
  // Sắp xếp đặc biệt cho đợt hàng và size
  let sortedKeys;
  if (title === "Đợt hàng") {
    sortedKeys = Object.keys(group).sort((a, b) => {
      const getOrder = (dot) => {
        if (!dot) return 8000;
        const lowerDot = dot.toLowerCase().trim();
        
        // sp1, sp2, sp3, sp4, sp5, sp6, sp7, sp8, sp9, sp10, spthieu (theo số thứ tự)
        if (lowerDot.startsWith('sp')) {
          const num = lowerDot.match(/sp(\d+)/);
          if (num) return parseInt(num[1]);
          if (lowerDot.includes('thieu')) return 11; // spthieu sau sp10
          return 1000; // sp khác
        }
        
        // ctv, mvd, bnv (theo thứ tự trong hình)
        if (lowerDot === 'ctv') return 100;
        if (lowerDot === 'mvd') return 200;
        if (lowerDot === 'bnv') return 300;
        
        // si (bắt đầu bằng "si") - theo thứ tự trong hình
        if (lowerDot.startsWith('si')) {
          if (lowerDot === 'sihoang') return 400;
          if (lowerDot === 'siminhhuong') return 500;
          return 600; // si khác
        }
        
        // lon (kết thúc bằng "lon") - theo thứ tự trong hình
        if (lowerDot.endsWith('lon')) {
          if (lowerDot === 'inlon') return 700;
          if (lowerDot === 'phoisoanlon') return 800;
          if (lowerDot === 'tonsoanlon') return 900;
          return 1000; // lon khác
        }
        
        // hu (kết thúc bằng "hu") và các đợt khác - theo thứ tự trong hình
        if (lowerDot === 'lun') return 1100;
        if (lowerDot === 'do') return 1200;
        if (lowerDot === 'mayhu') return 1300;
        if (lowerDot.endsWith('hu')) return 1400;
        
        // khác
        return 7000;
      };
      
      const orderA = getOrder(a);
      const orderB = getOrder(b);
      
      // Nếu cùng thứ tự, sắp xếp theo tên
      if (orderA === orderB) {
        return a.localeCompare(b);
      }
      
      return orderA - orderB;
    });
  } else if (title === "Loại hàng") {
    // Sắp xếp Loại hàng theo thứ tự cố định
    sortedKeys = Object.keys(group).sort((a, b) => {
      const indexA = LOAI_HANG_ORDER.indexOf(a.toLowerCase());
      const indexB = LOAI_HANG_ORDER.indexOf(b.toLowerCase());
      if (indexA !== -1 && indexB !== -1) {
        return indexA - indexB;
      }
      if (indexA !== -1) return -1;
      if (indexB !== -1) return 1;
      return a.localeCompare(b);
    });
  } else if (title === "Loại sản xuất" || title === "Loại SX") {
    // Sắp xếp Loại sản xuất theo thứ tự cố định
    sortedKeys = Object.keys(group).sort((a, b) => {
      const indexA = LOAI_SX_ORDER.indexOf(a.toLowerCase());
      const indexB = LOAI_SX_ORDER.indexOf(b.toLowerCase());
      if (indexA !== -1 && indexB !== -1) {
        return indexA - indexB;
      }
      if (indexA !== -1) return -1;
      if (indexB !== -1) return 1;
      return a.localeCompare(b);
    });
  } else if (title === "Màu") {
    // Sắp xếp Màu theo số lượng giảm dần (từ lớn đến bé)
    sortedKeys = Object.keys(group).sort((a, b) => {
      const valueA = group[a] || 0;
      const valueB = group[b] || 0;
      if (valueB !== valueA) {
        return valueB - valueA;
      }
      return a.localeCompare(b);
    });
  } else if (title === "Size") {
    // Sắp xếp Size theo thứ tự: S, M, L, XL, XXL
    sortedKeys = Object.keys(group).sort((a, b) => {
      const sizeOrder = { 'S': 1, 'M': 2, 'L': 3, 'XL': 4, 'XXL': 5 };
      const orderA = sizeOrder[a] || 999;
      const orderB = sizeOrder[b] || 999;
      
      if (orderA === orderB) {
        return a.localeCompare(b);
      }
      
      return orderA - orderB;
    });
  } else {
    // Sắp xếp bình thường cho các nhóm khác
    sortedKeys = Object.keys(group).sort();
  }
  
  // 🔥 TỐI ƯU: Sử dụng for loop thay vì forEach
  for (let i = 0; i < sortedKeys.length; i++) {
    const k = sortedKeys[i];
    html+=`<tr><td class="label">${k}</td><td class="value">${group[k]}</td></tr>`;
  }
  html+=`</table></div>`;
  return html;
}

// Bảng thống kê Đợt hàng theo 4 bộ phận: KP, HS, HT, ĐH
function renderDotHang4BoPhan(){
  // Gom số lượng theo đợt cho từng bộ phận
  const counts = {}; // dot -> {kp, hs, ht, dh}
  const ensure = (dot) => {
    const key = (dot || '').toString().trim().toLowerCase();
    if (!counts[key]) counts[key] = { kp: 0, hs: 0, ht: 0, dh: 0 };
    return key;
  };
  // 🔥 TỐI ƯU: Sử dụng for loop thay vì forEach
  const kpEntries = Object.entries(moduleDots.khophoi);
  for (let i = 0; i < kpEntries.length; i++) {
    const [, dot] = kpEntries[i];
    counts[ensure(dot)].kp++;
  }
  const hsEntries = Object.entries(moduleDots.hangsan);
  for (let i = 0; i < hsEntries.length; i++) {
    const [, dot] = hsEntries[i];
    counts[ensure(dot)].hs++;
  }
  const htEntries = Object.entries(moduleDots.hangton);
  for (let i = 0; i < htEntries.length; i++) {
    const [, dot] = htEntries[i];
    counts[ensure(dot)].ht++;
  }
  const dhEntries = Object.entries(moduleDots.donghang);
  for (let i = 0; i < dhEntries.length; i++) {
    const [, dot] = dhEntries[i];
    counts[ensure(dot)].dh++;
  }

  // Sắp xếp đợt hàng giống logic renderGroup("Đợt hàng")
  const getOrder = (dot) => {
    if (!dot) return 8000;
    const lowerDot = dot.toLowerCase().trim();
    if (lowerDot.startsWith('sp')) {
      const num = lowerDot.match(/sp(\d+)/);
      if (num) return parseInt(num[1]);
      if (lowerDot.includes('thieu')) return 11;
      return 1000;
    }
    if (lowerDot === 'ctv') return 100;
    if (lowerDot === 'mvd') return 200;
    if (lowerDot === 'bnv') return 300;
    if (lowerDot.startsWith('si')) {
      if (lowerDot === 'sihoang') return 400;
      if (lowerDot === 'siminhhuong') return 500;
      return 600;
    }
    if (lowerDot.endsWith('lon')) {
      if (lowerDot === 'inlon') return 700;
      if (lowerDot === 'phoisoanlon') return 800;
      if (lowerDot === 'tonsoanlon') return 900;
      return 1000;
    }
    if (lowerDot === 'lun') return 1100;
    if (lowerDot === 'do') return 1200;
    if (lowerDot === 'mayhu') return 1300;
    if (lowerDot.endsWith('hu')) return 1400;
    return 7000;
  };

  const dots = Object.keys(counts).sort((a,b)=>{
    const oa = getOrder(a); const ob = getOrder(b);
    if (oa === ob) return a.localeCompare(b);
    return oa - ob;
  });

  let html = `<div class='stat-cell'><h4>Đợt hàng</h4>`;
  html += `<table class="stat-table"><thead><tr><th>Đợt hàng</th><th style="text-align:right">KP</th><th style="text-align:right">HS</th><th style="text-align:right">HT</th><th style="text-align:right">ĐH</th></tr></thead><tbody>`;
  // 🔥 TỐI ƯU: Sử dụng for loop thay vì forEach
  for (let i = 0; i < dots.length; i++) {
    const dot = dots[i];
    const c = counts[dot];
    html += `<tr><td class="label">${dot || ''}</td>` +
            `<td class="value">${c.kp}</td>` +
            `<td class="value">${c.hs}</td>` +
            `<td class="value">${c.ht}</td>` +
            `<td class="value">${c.dh}</td></tr>`;
  }
  html += `</tbody></table></div>`;
  return html;
}

// Bảng đợt hàng cho một bộ phận cụ thể (khophoi | sanxuat | thanhpham | hangsan | hangton | donghang)
function renderDotHangFor(moduleKey, title){
  // Hàm lọc dữ liệu theo ngày
  const filterByDate = (item) => {
    if(!tuNgayFilter && !denNgayFilter) return true;
    
    const maSanPham = (item.maGoc || item.ma || "").toString();
    const itemThoiGian = layThoiGianTuMa(maSanPham);
    
    if(itemThoiGian) {
      const parseDate = (dateStr) => {
        if(!dateStr) return null;
        const match1 = dateStr.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
        if(match1) {
          const day = parseInt(match1[1], 10);
          const month = parseInt(match1[2], 10) - 1;
          const year = parseInt(match1[3], 10);
          return new Date(year, month, day);
        }
        const match2 = dateStr.match(/(\d{1,2})\/(\d{1,2})\/(\d{4}),?\s*(\d{1,2}):(\d{1,2}):(\d{1,2})/);
        if(match2) {
          const day = parseInt(match2[1], 10);
          const month = parseInt(match2[2], 10) - 1;
          const year = parseInt(match2[3], 10);
          return new Date(year, month, day);
        }
        const match3 = dateStr.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
        if(match3) {
          const year = parseInt(match3[1], 10);
          const month = parseInt(match3[2], 10) - 1;
          const day = parseInt(match3[3], 10);
          return new Date(year, month, day);
        }
        const parsed = new Date(dateStr);
        if(!isNaN(parsed.getTime())) return parsed;
        return null;
      };
      
      const itemDate = parseDate(itemThoiGian);
      if(itemDate) {
        if(tuNgayFilter) {
          const tuNgay = new Date(tuNgayFilter);
          tuNgay.setHours(0, 0, 0, 0);
          if(itemDate < tuNgay) return false;
        }
        if(denNgayFilter) {
          const denNgay = new Date(denNgayFilter);
          denNgay.setHours(23, 59, 59, 999);
          if(itemDate > denNgay) return false;
        }
        return true;
      }
    }
    
    // Nếu không có thời gian và có filter, bỏ qua
    if(tuNgayFilter || denNgayFilter) return false;
    return true;
  };
  
  const counts = {};
  // Thống kê trạng thái theo đợt hàng: { dot: { banGiao: 0, hoanThanh: 0 } }
  const statusStats = {};
  const ensure = (dot) => {
    const key = (dot || '').toString().trim().toLowerCase();
    if (!counts[key]) {
      // Đối với donghang, counts là object với 3 cột: kp, hs, ht
      // Các module khác giữ nguyên là số
      counts[key] = (moduleKey === 'donghang') ? { kp: 0, hs: 0, ht: 0 } : 0;
      // Khởi tạo thống kê trạng thái cho đợt hàng
      statusStats[key] = { banGiao: 0, inTheu: 0, hoanThien: 0, hoanThanh: 0, chuaHoanThanh: 0 };
    }
    return key;
  };
  
  // Lọc moduleDots theo ngày
  const mod = moduleDots[moduleKey] || {};
  const filteredMod = {};
  if(tuNgayFilter || denNgayFilter) {
    Object.entries(mod).forEach(([maGoc, dot]) => {
      const item = { maGoc, ma: maGoc };
      if(filterByDate(item)) {
        filteredMod[maGoc] = dot;
      }
    });
  } else {
    Object.assign(filteredMod, mod);
  }
  
  // Đối với donghang, tính riêng theo 3 dây chuyền
  if (moduleKey === 'donghang') {
    // Hàm chuẩn hóa đợt hàng: loại bỏ tiền tố "hs" hoặc "ht" nếu có
    const normalizeDot = (dot) => {
      if (!dot) return '';
      const lowerDot = dot.toLowerCase().trim();
      // Loại bỏ tiền tố "hs" hoặc "ht" nếu có
      if (lowerDot.startsWith('hs')) {
        return lowerDot.substring(2).trim();
      }
      if (lowerDot.startsWith('ht')) {
        return lowerDot.substring(2).trim();
      }
      return lowerDot;
    };
    
    const modEntries = Object.entries(filteredMod);
    for (let i = 0; i < modEntries.length; i++) {
      const [maGoc, dot] = modEntries[i];
      if (!maGoc) continue;
      const code = maGoc.toLowerCase();
      const isHS = code.startsWith('hs');
      const isHT = code.startsWith('ht');
      // Chuẩn hóa đợt hàng: loại bỏ tiền tố "hs" hoặc "ht" để nhóm chung
      const normalizedDot = normalizeDot(dot);
      // Bỏ qua nếu đợt hàng rỗng sau khi chuẩn hóa
      if (!normalizedDot || normalizedDot.trim() === '') continue;
      const key = ensure(normalizedDot);
      
      if (isHS) {
        counts[key].hs++;
      } else if (isHT) {
        counts[key].ht++;
      } else {
        counts[key].kp++;
      }
    }
  } else {
    // Các module khác: giữ nguyên logic cũ
    const modValues = Object.values(filteredMod);
    for (let i = 0; i < modValues.length; i++) {
      counts[ensure(modValues[i])]++;
    }
  }

  // Tính toán thống kê từ moduleData - lọc theo ngày
  const allData = moduleData[moduleKey] || [];
  const data = (tuNgayFilter || denNgayFilter) ? allData.filter(filterByDate) : allData;
  const tongSo = data.length;
  
  // Tính thống kê trạng thái cho từng bộ phận
  let banGiaoCount = 0;      // Số sản phẩm có trạng thái "Bàn giao" (cho KP, HS, HT)
  let inTheuCount = 0;       // Số sản phẩm có trạng thái "In & thêu" (cho Sản xuất)
  let hoanThienCount = 0;    // Số sản phẩm có trạng thái "Hoàn thiện" (cho Thành phẩm)
  let hoanThanhCount = 0;    // Số sản phẩm có trạng thái "Hoàn thành" hoặc trạng thái hoàn thành của từng bộ phận
  // Thống kê "Chưa hoàn thành" theo đợt hàng: { dot: count }
  const chuaHoanThanhByDot = {};
  
  // Tính trạng thái hoàn thành cho từng bộ phận - ĐỌC TRỰC TIẾP TỪ DỮ LIỆU CỦA TỪNG MODULE
  // Dữ liệu đã được lấy từ moduleData[moduleKey] - đây là dữ liệu trực tiếp từ các file module
  data.forEach(p => {
    const maGoc = (p.maGoc || p.ma || '').toString().trim();
    if (!maGoc) return;
    
    const trangThai = (p.trangThai || '').trim();
    
    // Lấy đợt hàng của sản phẩm này - đảm bảo khớp với cách tính counts
    let dot = '';
    if (moduleDots[moduleKey] && moduleDots[moduleKey][maGoc]) {
      dot = moduleDots[moduleKey][maGoc].toString().trim().toLowerCase();
    } else if (p.dotHang) {
      dot = (p.dotHang || '').toString().trim().toLowerCase();
    }
    
    // Chuẩn hóa đợt hàng (loại bỏ tiền tố hs/ht nếu có) - giống như logic trong counts
    if (moduleKey === 'donghang') {
      const code = maGoc.toLowerCase();
      const isHS = code.startsWith('hs');
      const isHT = code.startsWith('ht');
      
      // Chuẩn hóa đợt hàng: loại bỏ tiền tố "hs" hoặc "ht" để nhóm chung
      if (dot.startsWith('hs')) {
        dot = dot.substring(2).trim();
      }
      if (dot.startsWith('ht')) {
        dot = dot.substring(2).trim();
      }
    }
    
    // Đảm bảo dotKey khớp với key trong counts (lowercase, trimmed)
    const dotKey = dot || '';
    // Đảm bảo statusStats có entry cho đợt hàng này
    if (dotKey && !statusStats[dotKey]) {
      statusStats[dotKey] = { banGiao: 0, inTheu: 0, hoanThien: 0, hoanThanh: 0, chuaHoanThanh: 0 };
    }
    // Đảm bảo chuaHoanThanhByDot có entry cho đợt hàng này
    if (dotKey && !chuaHoanThanhByDot[dotKey]) {
      chuaHoanThanhByDot[dotKey] = 0;
    }
    
    // Đếm "Bàn giao", "In & thêu", "Hoàn thiện", "Hoàn thành" - ĐỌC TRỰC TIẾP TỪ TRẠNG THÁI TRONG DỮ LIỆU
    if (moduleKey === 'khophoi' || moduleKey === 'hangsan' || moduleKey === 'hangton') {
        // Kho phôi, Hàng sẵn, Hàng tồn: "Bàn giao" và "Hoàn thành" là hai trạng thái riêng biệt
        // "Bàn giao" = đã bàn giao (chưa hoàn thành, KHÔNG tính vào "Hoàn thành")
        // "Hoàn thành" = đã hoàn thành (chỉ tính sản phẩm có trạng thái "Hoàn thành")
        if (trangThai === 'Bàn giao') {
          banGiaoCount++;
          // "Bàn giao" KHÔNG được tính vào "Hoàn thành" (là trạng thái riêng)
          // Cập nhật thống kê theo đợt hàng
          if (statusStats[dotKey]) {
            statusStats[dotKey].banGiao++;
          }
        } else if (trangThai === 'Hoàn thành') {
          hoanThanhCount++;
          if (statusStats[dotKey]) {
            statusStats[dotKey].hoanThanh++;
          }
        }
      } else if (moduleKey === 'sanxuat') {
        // Sản xuất: "In & thêu" và "Hoàn thành" là hai trạng thái riêng biệt
        // "In & thêu" = đang ở giai đoạn in thêu (chưa hoàn thành, KHÔNG tính vào "Hoàn thành")
        // "Hoàn thành" = đã hoàn thành (chỉ tính sản phẩm có trạng thái "Hoàn thành")
        if (trangThai === 'In & thêu' || trangThai === 'Inthêu') {
          inTheuCount++;
          // "In & thêu" KHÔNG được tính vào "Hoàn thành" (là trạng thái riêng)
          if (dotKey && statusStats[dotKey]) {
            statusStats[dotKey].inTheu = (statusStats[dotKey].inTheu || 0) + 1;
          }
        } else if (trangThai === 'Hoàn thành') {
          hoanThanhCount++;
          if (dotKey && statusStats[dotKey]) {
            statusStats[dotKey].hoanThanh++;
          }
        }
      } else if (moduleKey === 'thanhpham') {
        // Thành phẩm: "Hoàn thiện" và "Hoàn thành" là hai trạng thái riêng biệt
        // "Hoàn thiện" = đang ở giai đoạn hoàn thiện (chưa hoàn thành, KHÔNG tính vào "Hoàn thành")
        // "Hoàn thành" = đã hoàn thành (chỉ tính sản phẩm có trạng thái "Hoàn thành")
        if (trangThai === 'Hoàn thiện') {
          hoanThienCount++;
          // "Hoàn thiện" KHÔNG được tính vào "Hoàn thành" (là trạng thái riêng)
          if (dotKey && statusStats[dotKey]) {
            statusStats[dotKey].hoanThien = (statusStats[dotKey].hoanThien || 0) + 1;
          }
        } else if (trangThai === 'Hoàn thành') {
          hoanThanhCount++;
          if (dotKey && statusStats[dotKey]) {
            statusStats[dotKey].hoanThanh++;
          }
        }
      }
    
    // Không tính "Hoàn thành" cho Đóng hàng ở đây (sẽ tính theo dây chuyền riêng)
  });
  
  // Tính "Chưa hoàn thành" cho từng đợt hàng
  // Chưa hoàn thành = Tổng đợt hàng - Hoàn thành
  Object.keys(counts).forEach(dot => {
    // Lấy tổng số sản phẩm trong đợt hàng này
    let dotTotal = 0;
    if (moduleKey === 'donghang') {
      const c = counts[dot];
      dotTotal = (c.kp || 0) + (c.hs || 0) + (c.ht || 0);
    } else {
      dotTotal = counts[dot] || 0;
    }
    
    const stats = statusStats[dot] || { banGiao: 0, inTheu: 0, hoanThien: 0, hoanThanh: 0, chuaHoanThanh: 0 };
    
    // Tính "Chưa hoàn thành" = Tổng - Hoàn thành
    // Đảm bảo: Tổng = Hoàn thành + Chưa hoàn thành
    const chuaHoanThanh = dotTotal - stats.hoanThanh;
    // Đảm bảo giá trị không âm
    const chuaHoanThanhFinal = Math.max(0, chuaHoanThanh);
    chuaHoanThanhByDot[dot] = chuaHoanThanhFinal;
    if (statusStats[dot]) {
      statusStats[dot].chuaHoanThanh = chuaHoanThanhFinal;
    }
    
    // Kiểm tra: Tổng phải bằng tổng các trạng thái
    // Tổng = Hoàn thành + Chưa hoàn thành
    const tongKiemTra = stats.hoanThanh + chuaHoanThanhFinal;
    // Nếu không khớp, điều chỉnh "Chưa hoàn thành" để đảm bảo tổng bằng Tổng
    if (tongKiemTra !== dotTotal && dotTotal > 0) {
      const chuaHoanThanhAdjusted = dotTotal - stats.hoanThanh;
      chuaHoanThanhByDot[dot] = Math.max(0, chuaHoanThanhAdjusted);
      if (statusStats[dot]) {
        statusStats[dot].chuaHoanThanh = Math.max(0, chuaHoanThanhAdjusted);
      }
    }
  });
  
  // Tính tổng "Chưa hoàn thành" cho toàn bộ module
  // Đảm bảo: Tổng = Hoàn thành + Chưa hoàn thành
  let chuaHoanThanhCount = 0;
  if (moduleKey === 'donghang') {
    // Đóng hàng: Tổng - (3 dây chuyền hoàn thành)
    // Sẽ tính sau khi tính hoàn thành theo dây chuyền
  } else {
    // Các module khác: Chưa hoàn thành = Tổng - Hoàn thành
    // Đảm bảo: Tổng = Hoàn thành + Chưa hoàn thành
    chuaHoanThanhCount = tongSo - hoanThanhCount;
    // Đảm bảo giá trị không âm
    if (chuaHoanThanhCount < 0) chuaHoanThanhCount = 0;
  }
  
  // Tính hoàn thành theo 3 dây chuyền riêng biệt (chỉ cho Đóng hàng)
  let hoanThanhKP_SX_TP_DH = 0; // KP -> SX -> TP -> ĐH
  let hoanThanhHS_DH = 0;        // HS -> ĐH
  let hoanThanhHT_DH = 0;        // HT -> ĐH
  
  // Chỉ tính khi moduleKey là 'donghang'
  if (moduleKey === 'donghang') {
    // Duyệt qua tất cả sản phẩm có trong Đóng hàng (đã lọc theo ngày)
    data.forEach(p => {
      const maGoc = (p.maGoc || p.ma || '').toString().trim();
      if (!maGoc) return;
      const code = maGoc.toLowerCase();
      const isHS = code.startsWith('hs');
      const isHT = code.startsWith('ht');
      
      if (isHS) {
        // Dây chuyền HS -> ĐH: hoàn thành khi có ở HS và ĐH
        if (presenceMaps.hangsan.has(maGoc)) {
          hoanThanhHS_DH++;
        }
      } else if (isHT) {
        // Dây chuyền HT -> ĐH: hoàn thành khi có ở HT và ĐH
        if (presenceMaps.hangton.has(maGoc)) {
          hoanThanhHT_DH++;
        }
      } else {
        // Dây chuyền chính: hoàn thành khi có ở cả 4 bộ phận (KP, SX, TP, ĐH)
        // KHÔNG cần theo thứ tự thêm sản phẩm - chỉ cần đảm bảo có đủ 4 bộ phận
        if (presenceMaps.khophoi.has(maGoc) && 
            presenceMaps.sanxuat.has(maGoc) && 
            presenceMaps.thanhpham.has(maGoc)) {
          hoanThanhKP_SX_TP_DH++;
        }
      }
    });
    
    // Tính "Chưa hoàn thành" cho Đóng hàng sau khi đã tính hoàn thành theo dây chuyền
    const totalHoanThanh = hoanThanhKP_SX_TP_DH + hoanThanhHS_DH + hoanThanhHT_DH;
    chuaHoanThanhCount = tongSo - totalHoanThanh;
    
    // Cập nhật lại "Chưa hoàn thành" cho từng đợt hàng của Đóng hàng
    Object.keys(counts).forEach(dot => {
      const c = counts[dot];
      const dotTotal = (c.kp || 0) + (c.hs || 0) + (c.ht || 0);
      const stats = statusStats[dot] || { banGiao: 0, inTheu: 0, hoanThien: 0, hoanThanh: 0, chuaHoanThanh: 0 };
      
      // Tính hoàn thành của đợt hàng này (tổng 3 dây chuyền)
      const dotData = data.filter(p => {
        const maGoc = (p.maGoc || p.ma || '').toString().trim();
        if (!maGoc) return false;
        const code = maGoc.toLowerCase();
        
        let pDot = '';
        if (moduleDots[moduleKey] && moduleDots[moduleKey][maGoc]) {
          pDot = moduleDots[moduleKey][maGoc].toString().trim().toLowerCase();
        } else if (p.dotHang) {
          pDot = (p.dotHang || '').toString().trim().toLowerCase();
        }

        }

        }

      });
      
      let dotHoanThanh = 0;
      dotData.forEach(p => {

        if (!maGoc) return;
        const code = maGoc.toLowerCase();

        const isHT = code.startsWith('ht');

        } else if (!isHS && !isHT && 
                   presenceMaps.khophoi.has(maGoc) && 
                   presenceMaps.sanxuat.has(maGoc) &&

      });
      
      const dotChuaHoanThanh = dotTotal - dotHoanThanh;
      if (statusStats[dot]) {
        statusStats[dot].chuaHoanThanh = Math.max(0, dotChuaHoanThanh);
      }
      chuaHoanThanhByDot[dot] = Math.max(0, dotChuaHoanThanh);

  } else {

  // Tính "Đang xử lý": sản phẩm KHÔNG hoàn thành và chưa hoàn thành toàn bộ dây chuyền

    // Đang xử lý = không hoàn thành và chưa hoàn thành toàn bộ dây chuyền
    return !isCompletedFullChain;

  }
  
  // Hiển thị "Hoàn thành" của từng bộ phận
  if (moduleKey === 'donghang') {

    html += `

  } else {

      <span style="color:#2e7d32;font-weight:bold;">${hoanThanhCount}</span>

  }
  
  
  html += `</div>`;
  // Đối với donghang, hiển thị 3 cột riêng: KP, HS, HT + cột Trạng thái
  if (moduleKey === 'donghang') {
    html += `<table class="stat-table"><thead><tr><th>Đợt hàng</th><th style=\"text-align:right\">KP</th><th style=\"text-align:right\">HS</th><th style=\"text-align:right\">HT</th><th style=\"text-align:left\">Trạng thái</th></tr></thead><tbody>`;
    for (let i = 0; i < dots.length; i++) {

      if (stats.banGiao > 0) statusText.push(`📦 ${stats.banGiao}`);

      if (stats.hoanThien > 0) statusText.push(`✨ ${stats.hoanThien}`);
      html += `<tr><td class=\"label\">${dot || ''}</td>` +
              `<td class=\"value\">${c.kp || 0}</td>` +
              `<td class=\"value\">${c.hs || 0}</td>` +
              `<td class=\"value\">${c.ht || 0}</td>` +
              `<td style=\"font-size:11px;color:#666;\">${statusText.length > 0 ? statusText.join(' | ') : '-'}</td></tr>`;
    }
  } else {
    // Các module khác: hiển thị SL + cột Trạng thái
    html += `<table class="stat-table"><thead><tr><th>Đợt hàng</th><th style=\"text-align:right\">SL</th><th style=\"text-align:left\">Trạng thái</th></tr></thead><tbody>`;
    for (let i = 0; i < dots.length; i++) {
      const dot = dots[i];
      const stats = statusStats[dot] || { banGiao: 0, inTheu: 0, hoanThien: 0, hoanThanh: 0, chuaHoanThanh: 0 };
      const statusText = [];

      html += `<tr><td class=\"label\">${dot || ''}</td><td class=\"value\">${counts[dot]}</td><td style=\"font-size:11px;color:#666;\">${statusText.length > 0 ? statusText.join(' | ') : '-'}</td></tr>`;

  }
  html += `</tbody></table></div>`;
  return html;
}

// 🔥 TỐI ƯU HÀM HIỂN THỊ VỚI DEBOUNCE VÀ CACHE
let filterTimeout = null;
let lastFilterState = null;
let isRendering = false; // Flag để tránh render đồng thời

// Debounce function tối ưu
function debounce(func, wait) {
  let timeout;
  return function executedFunction(...args) {
    const later = () => {
      clearTimeout(timeout);
      func(...args);
    };
    clearTimeout(timeout);
    timeout = setTimeout(later, wait);
  };
}

// Throttle function cho scroll và resize
function throttle(func, limit) {
  let inThrottle;
  return function(...args) {
    if (!inThrottle) {
      func.apply(this, args);
      inThrottle = true;
      setTimeout(() => inThrottle = false, limit);
    }
  };
}

        if (chain !== dayChuyenValue) return false;

      // Lọc theo đợt hàng, loại hàng, loại SX, ngày TRƯỚC KHI lọc trạng thái
      const dotVal = selectedDotHang || dotHangFilter || '';
      const lhVal  = selectedLoaiHang || loaiHangFilter || '';
      const lxVal  = selectedLoaiSX || loaiSXFilter || '';
      if (dotVal && (d.dotHang || '') !== dotVal) return false;
      if (lhVal && (d.loaiHang || '') !== lhVal) return false;
      if (lxVal && (d.loaiSX || '') !== lxVal) return false;
      
      // Lọc theo thời gian (từ ngày đến ngày) - lấy từ mã sản phẩm
      if(tuNgayFilter || denNgayFilter) {
        // Lấy thời gian từ mã sản phẩm (maGoc hoặc ma)
        const maSanPham = d.maGoc || d.ma || "";
        const itemThoiGian = layThoiGianTuMa(maSanPham);
        
        if(itemThoiGian) {
          // Parse thời gian từ mã sản phẩm (hỗ trợ nhiều format)
          const parseDate = (dateStr) => {
            if(!dateStr) return null;
            
            // Format 1: DD/MM/YYYY hoặc DD/MM/YYYY HH:mm:ss (từ mã sản phẩm)
            const match1 = dateStr.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
            if(match1) {
              const day = parseInt(match1[1], 10);
              const month = parseInt(match1[2], 10) - 1;
              const year = parseInt(match1[3], 10);
              return new Date(year, month, day);
            }
            
            // Format 2: DD/MM/YYYY, HH:mm:ss (từ toLocaleString() - locale vi-VN)
            const match2 = dateStr.match(/(\d{1,2})\/(\d{1,2})\/(\d{4}),?\s*(\d{1,2}):(\d{1,2}):(\d{1,2})/);
            if(match2) {
              const day = parseInt(match2[1], 10);
              const month = parseInt(match2[2], 10) - 1;
              const year = parseInt(match2[3], 10);
              return new Date(year, month, day);
            }
            
            // Format 3: ISO format (YYYY-MM-DD hoặc YYYY-MM-DDTHH:mm:ss)
            const match3 = dateStr.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
            if(match3) {
              const year = parseInt(match3[1], 10);
              const month = parseInt(match3[2], 10) - 1;
              const day = parseInt(match3[3], 10);
              return new Date(year, month, day);
            }
            
            // Format 4: Thử parse bằng Date constructor (fallback)
            const parsed = new Date(dateStr);
            if(!isNaN(parsed.getTime())) {
              return parsed;
            }
            
            return null;
          };
          
          const itemDate = parseDate(itemThoiGian);
          if(itemDate) {
            // So sánh với từ ngày
            if(tuNgayFilter) {
              const tuNgay = new Date(tuNgayFilter);
              tuNgay.setHours(0, 0, 0, 0);
              if(itemDate < tuNgay) return false;
            }
            // So sánh với đến ngày
            if(denNgayFilter) {
              const denNgay = new Date(denNgayFilter);
              denNgay.setHours(23, 59, 59, 999);
              if(itemDate > denNgay) return false;
            }
          } else {
            // Nếu không parse được thời gian và có filter, bỏ qua item này
            if(tuNgayFilter || denNgayFilter) return false;
          }
        } else {
          // Nếu không có thời gian trong mã sản phẩm và có filter, bỏ qua item này
          if(tuNgayFilter || denNgayFilter) return false;
        }
      }
      
      // Lọc theo trạng thái - sử dụng logic giống tính thống kê
      const normalizedFilter = ((selectedTrangThai || trangThaiFilter || '') === 'Hoàn thành (Tự động)') ? 'Hoàn thành' : ((selectedTrangThai || trangThaiFilter || ''));
      
      // Logic filter: Có 2 trạng thái - Hoàn thành và Chưa hoàn thành
      if (normalizedFilter === 'Hoàn thành') {
        // Kiểm tra hoàn thành theo dây chuyền (giống logic tính thống kê)
        const code = maGoc.toLowerCase();
        const isHS = code.startsWith('hs');
        const isHT = code.startsWith('ht');
        
        let isCompleted = false;
        if (isHS) {
          isCompleted = presenceMaps.hangsan.has(maGoc) && presenceMaps.donghang.has(maGoc);
        } else if (isHT) {
          isCompleted = presenceMaps.hangton.has(maGoc) && presenceMaps.donghang.has(maGoc);
        } else {
          isCompleted = presenceMaps.khophoi.has(maGoc) &&
                       presenceMaps.sanxuat.has(maGoc) &&
                       presenceMaps.thanhpham.has(maGoc) &&
                       presenceMaps.donghang.has(maGoc);
        }
        if (!isCompleted) return false;
      } else if (normalizedFilter === 'Chưa hoàn thành' || normalizedFilter === 'Đang xử lý') {
        // Kiểm tra "Chưa hoàn thành": không hoàn thành toàn bộ dây chuyền
        // Kiểm tra hoàn thành toàn bộ dây chuyền
        const code = maGoc.toLowerCase();
        const isHS = code.startsWith('hs');
        const isHT = code.startsWith('ht');
        
        let isCompletedFullChain = false;
        if (isHS) {
          isCompletedFullChain = presenceMaps.hangsan.has(maGoc) && presenceMaps.donghang.has(maGoc);
        } else if (isHT) {
          isCompletedFullChain = presenceMaps.hangton.has(maGoc) && presenceMaps.donghang.has(maGoc);
        } else {
          isCompletedFullChain = presenceMaps.khophoi.has(maGoc) &&
                                 presenceMaps.sanxuat.has(maGoc) &&
                                 presenceMaps.thanhpham.has(maGoc) &&
                                 presenceMaps.donghang.has(maGoc);
        }
        
        // Nếu hoàn thành toàn bộ dây chuyền → không phải "Chưa hoàn thành"
        if (isCompletedFullChain) return false;
      }
      
      return true;
    });
    
    // Cập nhật mergedDataBeforeStatusFilter: lọc theo tất cả filter TRỪ trạng thái
    mergedDataBeforeStatusFilter = mergedDataBeforeStatusFilter.filter(d => {
      const maGoc = d.maGoc || '';
      // Lọc theo dây chuyền
      const dayChuyenValue = selectedDayChuyen || dayChuyenFilter || '';
      if (dayChuyenValue) {
        const chain = getProductChain(d);
        if (chain !== dayChuyenValue) return false;
      }
      
      // Lọc theo đợt hàng, loại hàng, loại SX
      const dotVal = selectedDotHang || dotHangFilter || '';
      const lhVal  = selectedLoaiHang || loaiHangFilter || '';
      const lxVal  = selectedLoaiSX || loaiSXFilter || '';
      if (dotVal && (d.dotHang || '') !== dotVal) return false;
      if (lhVal && (d.loaiHang || '') !== lhVal) return false;
      if (lxVal && (d.loaiSX || '') !== lxVal) return false;
      
      // Lọc theo thời gian (từ ngày đến ngày) - lấy từ mã sản phẩm
      if(tuNgayFilter || denNgayFilter) {
        const maSanPham = d.maGoc || d.ma || "";
        const itemThoiGian = layThoiGianTuMa(maSanPham);
        
        if(itemThoiGian) {
          const parseDate = (dateStr) => {
            if(!dateStr) return null;
            const match1 = dateStr.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
            if(match1) {
              const day = parseInt(match1[1], 10);
              const month = parseInt(match1[2], 10) - 1;
              const year = parseInt(match1[3], 10);
              return new Date(year, month, day);
            }
            const match2 = dateStr.match(/(\d{1,2})\/(\d{1,2})\/(\d{4}),?\s*(\d{1,2}):(\d{1,2}):(\d{1,2})/);
            if(match2) {
              const day = parseInt(match2[1], 10);
              const month = parseInt(match2[2], 10) - 1;
              const year = parseInt(match2[3], 10);
              return new Date(year, month, day);
            }
            const match3 = dateStr.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
            if(match3) {
              const year = parseInt(match3[1], 10);
              const month = parseInt(match3[2], 10) - 1;
              const day = parseInt(match3[3], 10);
              return new Date(year, month, day);
            }
            const parsed = new Date(dateStr);
            if(!isNaN(parsed.getTime())) return parsed;
            return null;
          };
          
          const itemDate = parseDate(itemThoiGian);
          if(itemDate) {
            if(tuNgayFilter) {
              const tuNgay = new Date(tuNgayFilter);
              tuNgay.setHours(0, 0, 0, 0);
              if(itemDate < tuNgay) return false;
            }
            if(denNgayFilter) {
              const denNgay = new Date(denNgayFilter);
              denNgay.setHours(23, 59, 59, 999);
              if(itemDate > denNgay) return false;
            }
          } else {
            if(tuNgayFilter || denNgayFilter) return false;
          }
        } else {
          if(tuNgayFilter || denNgayFilter) return false;
        }
      }
      
      return true;
    });

    // Tính số liệu tổng quan theo dữ liệu đã lọc
    try {
      // LƯU Ý: "Tổng sản phẩm" sẽ được tính từ tổng các trạng thái
      // để đảm bảo: Tổng = Đang xử lý + Hoàn thành
      // KHÔNG dùng mergedData.length vì "Đang xử lý" tính từ tổng các module (có thể đếm trùng)
      
      // Tính "Đang xử lý", "Hoàn thành" từ mergedData (sản phẩm unique)
      // Để đảm bảo tổng = Đang xử lý + Hoàn thành + Bàn giao = Tổng sản phẩm
      let completedCount = 0;
      let inProgressCount = 0;
      let banGiaoCount = 0; // Đếm "Bàn giao" từ các module KP, HS, HT
      
      // 🔥 TỐI ƯU: Duyệt qua mergedData (mỗi mã chỉ xuất hiện 1 lần)
      for (let i = 0; i < mergedData.length; i++) {
        const item = mergedData[i];
        const maGoc = (item.maGoc || item.ma || '').toString().trim();
        if (!maGoc) continue;
        
        const displayStatus = ((item.trangThai || '').trim());
        
        // Kiểm tra trạng thái "Hoàn thành" theo dây chuyền (giống autoUpdateStatuses)
        // KHÔNG chỉ dựa vào trạng thái trong module, mà phải kiểm tra presence thực tế
        // Điều này đảm bảo tính chính xác: một sản phẩm chỉ "Hoàn thành" khi có đủ ở tất cả bước trong dây chuyền
        const code = maGoc.toLowerCase();
        const isHS = code.startsWith('hs');
        const isHT = code.startsWith('ht');
        
        let isCompleted = false;
        if (isHS) {
          // Dây chuyền HS -> ĐH: phải có ở Hàng sẵn VÀ Đóng hàng
          isCompleted = presenceMaps.hangsan.has(maGoc) && presenceMaps.donghang.has(maGoc);
        } else if (isHT) {
          // Dây chuyền HT -> ĐH: phải có ở Hàng tồn VÀ Đóng hàng
          isCompleted = presenceMaps.hangton.has(maGoc) && presenceMaps.donghang.has(maGoc);
        } else {
          // Dây chuyền chính: phải có đủ ở tất cả 4 bộ phận (KP, SX, TP, ĐH)
          // KHÔNG cần theo thứ tự thêm sản phẩm - chỉ cần đảm bảo có đủ 4 bộ phận
          isCompleted = presenceMaps.khophoi.has(maGoc) && 
                       presenceMaps.sanxuat.has(maGoc) && 
                       presenceMaps.thanhpham.has(maGoc) && 
                       presenceMaps.donghang.has(maGoc);
        }
        
        // Nếu hoàn thành, đếm vào "Hoàn thành" (ưu tiên cao nhất)
        if (isCompleted) {
          completedCount++;
          continue;
        }
        
        // Kiểm tra "Bàn giao" (ưu tiên thứ ba) - từ các module KP, HS, HT
        // "Bàn giao" là trạng thái của sản phẩm ở các module này khi chưa hoàn thành toàn bộ dây chuyền
        const codeLower = maGoc.toLowerCase();
        const isKP_Check = codeLower.startsWith('kp') || (!codeLower.startsWith('hs') && !codeLower.startsWith('ht'));
        const isHS_Check = codeLower.startsWith('hs');
        const isHT_Check = codeLower.startsWith('ht');
        
        let isBanGiao = false;
        if (isKP_Check && presenceMaps.khophoi.has(maGoc)) {
          // Kiểm tra trạng thái "Bàn giao" trong module khophoi
          const kpItem = moduleData.khophoi.find(p => (p.maGoc || p.ma || '').toString().trim() === maGoc);
          if (kpItem && (kpItem.trangThai || '').trim() === 'Bàn giao') {
            isBanGiao = true;
          }
        } else if (isHS_Check && presenceMaps.hangsan.has(maGoc)) {
          // Kiểm tra trạng thái "Bàn giao" trong module hangsan
          const hsItem = moduleData.hangsan.find(p => (p.maGoc || p.ma || '').toString().trim() === maGoc);
          if (hsItem && (hsItem.trangThai || '').trim() === 'Bàn giao') {
            isBanGiao = true;
          }
        } else if (isHT_Check && presenceMaps.hangton.has(maGoc)) {
          // Kiểm tra trạng thái "Bàn giao" trong module hangton
          const htItem = moduleData.hangton.find(p => (p.maGoc || p.ma || '').toString().trim() === maGoc);
          if (htItem && (htItem.trangThai || '').trim() === 'Bàn giao') {
            isBanGiao = true;
          }
        }
        
        if (isBanGiao) {
          banGiaoCount++;
          continue;
        }
        
        // Tất cả sản phẩm không hoàn thành, không thiếu bước trước và không bàn giao đều là "Chưa hoàn thành"
      }
      
      // Tính "Đang xử lý" theo DÂY CHUYỀN sản xuất
      // Sử dụng Set để tránh đếm trùng sản phẩm "Đang xử lý"
      const inProgressProductsSet = new Set();
      
      // 🔥 TỐI ƯU: Duyệt qua mergedData (dữ liệu đã lọc)
      for (let i = 0; i < mergedData.length; i++) {
        const item = mergedData[i];
        const maGoc = (item.maGoc || item.ma || '').toString().trim();
        if (!maGoc) continue;
        
        // Kiểm tra xem có phải "Hoàn thành" toàn bộ dây chuyền không
        const code = maGoc.toLowerCase();
        const isHS = code.startsWith('hs');
        const isHT = code.startsWith('ht');
        
        let isCompletedFullChain = false;
        if (isHS) {
          isCompletedFullChain = presenceMaps.hangsan.has(maGoc) && presenceMaps.donghang.has(maGoc);
        } else if (isHT) {
          isCompletedFullChain = presenceMaps.hangton.has(maGoc) && presenceMaps.donghang.has(maGoc);
        } else {
          isCompletedFullChain = presenceMaps.khophoi.has(maGoc) &&
                                 presenceMaps.sanxuat.has(maGoc) &&
                                 presenceMaps.thanhpham.has(maGoc) &&
                                 presenceMaps.donghang.has(maGoc);
        }
        
        // Nếu KHÔNG hoàn thành toàn bộ dây chuyền → "Đang xử lý"
        if (!isCompletedFullChain) {
          
          // Đảm bảo sản phẩm này có ở ít nhất 1 module trong dây chuyền
          const hasInChain = presenceMaps.khophoi.has(maGoc) ||
                             presenceMaps.sanxuat.has(maGoc) ||
                             presenceMaps.thanhpham.has(maGoc) ||
                             presenceMaps.donghang.has(maGoc) ||
                             presenceMaps.hangsan.has(maGoc) ||
                             presenceMaps.hangton.has(maGoc);
          
          if (hasInChain) {
            inProgressProductsSet.add(maGoc);
          }
        }
      }
      
      // "Đang xử lý" = số lượng unique sản phẩm trong mergedData (đã lọc)
      // Khớp với số lượng hiển thị trong danh sách
      inProgressCount = inProgressProductsSet.size;
      
      // Debug: số lượng từ mergedData (đã lọc) để so sánh với thống kê đợt hàng
      const sanxuatInProgress = Array.from(inProgressProductsSet).filter(maGoc => {
        if (!presenceMaps.sanxuat.has(maGoc)) return false;
        const sxItem = (moduleData.sanxuat || []).find(p => (p.maGoc || p.ma || '').toString().trim() === maGoc);
        if (!sxItem) return false;
        const sxStatus = (sxItem.trangThai || '').toString().trim();
        if (sxStatus === 'Hoàn thành') return false;
        // Đã bỏ kiểm tra thiếu bước trước
        // Kiểm tra hoàn thành toàn bộ dây chuyền
        const code = maGoc.toLowerCase();
        const isHS = code.startsWith('hs');
        const isHT = code.startsWith('ht');
        let isCompletedFullChain = false;
        if (isHS) {
          isCompletedFullChain = presenceMaps.hangsan.has(maGoc) && presenceMaps.donghang.has(maGoc);
        } else if (isHT) {
          isCompletedFullChain = presenceMaps.hangton.has(maGoc) && presenceMaps.donghang.has(maGoc);
        } else {
          isCompletedFullChain = presenceMaps.khophoi.has(maGoc) &&
                                 presenceMaps.sanxuat.has(maGoc) &&
                                 presenceMaps.thanhpham.has(maGoc) &&
                                 presenceMaps.donghang.has(maGoc);
        }
        return !isCompletedFullChain;
      }).length;
      
      const thanhphamInProgress = Array.from(inProgressProductsSet).filter(maGoc => {
        if (!presenceMaps.thanhpham.has(maGoc)) return false;
        const tpItem = (moduleData.thanhpham || []).find(p => (p.maGoc || p.ma || '').toString().trim() === maGoc);
        if (!tpItem) return false;
        const tpStatus = (tpItem.trangThai || '').toString().trim();
        if (tpStatus === 'Hoàn thành') return false;
        const isTpMissing = !presenceMaps.sanxuat.has(maGoc);
        if (isTpMissing) return false;
        // Kiểm tra hoàn thành toàn bộ dây chuyền
        const code = maGoc.toLowerCase();
        const isHS = code.startsWith('hs');
        const isHT = code.startsWith('ht');
        let isCompletedFullChain = false;
        if (isHS) {
          isCompletedFullChain = presenceMaps.hangsan.has(maGoc) && presenceMaps.donghang.has(maGoc);
        } else if (isHT) {
          isCompletedFullChain = presenceMaps.hangton.has(maGoc) && presenceMaps.donghang.has(maGoc);
        } else {
          isCompletedFullChain = presenceMaps.khophoi.has(maGoc) &&
                                 presenceMaps.sanxuat.has(maGoc) &&
                                 presenceMaps.thanhpham.has(maGoc) &&
                                 presenceMaps.donghang.has(maGoc);
        }
        return !isCompletedFullChain;
      }).length;
      
      // Tính "Tổng sản phẩm" từ mergedDataBeforeStatusFilter (KHÔNG lọc theo trạng thái)
      // mergedDataBeforeStatusFilter đã được lọc theo từ khóa, dây chuyền, đợt hàng, loại hàng, loại SX, ngày
      // NHƯNG CHƯA lọc theo trạng thái - để "Tổng sản phẩm" không thay đổi khi lọc trạng thái
      // QUAN TRỌNG: "Tổng sản phẩm" không phụ thuộc vào filter trạng thái, chỉ phụ thuộc vào các filter khác
      const total = mergedDataBeforeStatusFilter.length;
      
      // Debug log để kiểm tra
      console.log('🔍 Debug thống kê "Đang xử lý":', {
        'Tổng sản phẩm (danh sách unique)': mergedData.length,
        'Sản xuất - Đang xử lý (từ mergedData)': sanxuatInProgress,
        'Thành phẩm - Đang xử lý (từ mergedData)': thanhphamInProgress,
        'Tổng "Đang xử lý" (unique từ mergedData)': inProgressCount,
        'Tổng "Đang xử lý" (SX + TP từ mergedData)': sanxuatInProgress + thanhphamInProgress,
        'Hoàn thành': completedCount,
        'Tổng các trạng thái (ĐXL + HT)': inProgressCount + completedCount,
        'Chênh lệch với danh sách': mergedData.length - (inProgressCount + completedCount),
        note: '"Đang xử lý" = unique từ mergedData (khớp với danh sách). SX + TP có thể > unique nếu sản phẩm có ở cả 2 module.'
      });
      
      const soDongText = document.getElementById("soDongText") || document.getElementById("soDong");
      if (soDongText) {
        // Hiển thị thống kê với các trạng thái: Tổng, Hoàn thành, Chưa hoàn thành
        // Tổng sản phẩm = mergedData.length (sau khi lọc) để đảm bảo khớp với danh sách hiển thị
        // Khi lọc trạng thái, total sẽ thay đổi theo mergedData đã lọc
        soDongText.textContent = `Tổng: ${total} | Hoàn thành: ${completedCount} | Chưa hoàn thành: ${inProgressCount}`;
      }
    } catch(e) {}

    // 🔥 TỐI ƯU: Lưu filtered để dùng với phân trang nếu cần, sau đó render với requestAnimationFrame
    filteredData = mergedData;
    exportData = filteredData.slice();
    
    // Sử dụng requestIdleCallback nếu có để render khi browser rảnh
    const scheduleRender = (callback) => {
      if (window.requestIdleCallback) {
        requestIdleCallback(callback, { timeout: 100 });
      } else {
        requestAnimationFrame(callback);
      }
    };
    
    scheduleRender(() => {
      renderWithPagination();
      isRendering = false; // Reset flag sau khi render xong
    });
    
    if (needSync) { 
      luuLocal(); 
      // Invalid cache khi dữ liệu thay đổi
      statsCache.dataHash = null;
      statsCache.data = null;
    }
  }).catch((error) => {
    console.error('Error in hienThiImmediate:', error);
    isRendering = false; // Reset flag khi có lỗi
  });
}

function themNhieu(){

  const text=document.getElementById("maSanPham").value.trim();
  if(!text)return;
  const trangThai=document.getElementById("trangThai").value;
  const dong=text.split("\n");

    if(!d.includes("="))return;
    const parts = d.split("=");
