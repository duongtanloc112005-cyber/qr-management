<script>
let duLieu=[],soDongMoi=0,soDongCapNhat=0,tongSoCapNhat=0,soDongMoiVuaThem=0;

// Danh sách loại hàng cố định theo thứ tự
const LOAI_HANG_ORDER = ['tee', 'boxy', 'scc', 'skk', 'hd', 'zip', 'swt', 'bb', 'polo', 'khác'];

// Danh sách loại sản xuất cố định theo thứ tự
const LOAI_SX_ORDER = ['in', 'kt', 'theu', 'dtg', 'tp', 'khác'];
let dotHangFilter="",loaiHangFilter="",loaiSXFilter="",trangThaiFilter="";
let tuNgayFilter="",denNgayFilter=""; // Filter theo thời gian
// Đã bỏ missingDataCache - các bộ phận độc lập
// Đã bỏ nhật ký hoạt động

// 🔥 CACHE VÀ TỐI ƯU THỐNG KÊ
let statsCache = {
    data: null,
    dataHash: null,
    timestamp: null,
    cacheDuration: 5000 // Cache 5 giây
};

// Hàm tạo hash nhanh cho dữ liệu để kiểm tra thay đổi
function createDataHash(data) {
    // Hash đơn giản dựa trên số lượng và timestamp
    return `${data.length}_${data.length > 0 ? (data[0].thoiGian || '') : ''}`;
}

// Pagination variables
let currentPage = 1;
let itemsPerPage = 50; // Hiển thị 50 dòng mỗi trang
let filteredData = [];

// Debounce function để tối ưu tìm kiếm
let searchDebounceTimer = null;
function debounce(func, wait) {
  return function(...args) {
    clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => func.apply(this, args), wait);
  };
}

// WebSocket connection for sync
let ws = null;
let isConnected = false;
const MODULE_NAME = 'donghang';

// Đã tắt đăng nhập - không cần requireLogin nữa
// if (typeof requireLogin === 'function') {
//     if (document.readyState === 'loading') {
//         document.addEventListener('DOMContentLoaded', () => {

//         });
//     } else {

//     }
// } else {
//     // Nếu auth.js chưa load, đợi một chút rồi thử lại
//     setTimeout(() => {
//         if (typeof requireLogin === 'function') {
//             requireLogin(MODULE_NAME);
//         } else {
//             console.error('auth.js không tải được!');
//             document.body.style.display = 'block';
//         }
//     }, 500);
// }

// WebSocket functions
function initWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}`;
    
    try {
        ws = new WebSocket(wsUrl);
        
        ws.onopen = function() {
            console.log('WebSocket connected');
            isConnected = true;
            
            // Đăng ký module - kiểm tra trạng thái trước khi gửi
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'register',
                    module: MODULE_NAME
                }));
                
                // Gửi dữ liệu hiện tại lên server khi kết nối lại
                setTimeout(() => {
                    if (ws.readyState === WebSocket.OPEN) {
                        onReconnect();
                    }
                }, 1000); // Delay 1 giây để đảm bảo kết nối ổn định
            }
        };
        
        ws.onmessage = function(event) {
            try {
                const data = JSON.parse(event.data);
                
                if (data.type === 'sync' && data.module === MODULE_NAME) {
                    // Nhận dữ liệu đồng bộ từ server
                    duLieu = data.data || [];
                    
                    // Đồng bộ các biến đếm từ server nếu có
                    if (data.counters) {
                        soDongMoi = data.counters.soDongMoi || 0;
                        soDongCapNhat = data.counters.soDongCapNhat || 0;
                        soDongMoiVuaThem = data.counters.soDongMoiVuaThem || 0;
                        tongSoCapNhat = data.counters.tongSoCapNhat || 0;
                        
                        // Lưu vào localStorage
                        localStorage.setItem("soDongMoiDonghang", String(soDongMoi));
                        localStorage.setItem("soDongCapNhatDonghang", String(soDongCapNhat));
                        localStorage.setItem("soDongMoiVuaThemDonghang", String(soDongMoiVuaThem));
                        localStorage.setItem("tongSoCapNhatDonghang", String(tongSoCapNhat));
                    }
                    
                    // 🔥 TỐI ƯU: Invalid cache và render với requestAnimationFrame
                    statsCache.dataHash = null;
                    statsCache.data = null;
                    lastFilterState = null; // Reset filter state
                    
                    requestAnimationFrame(() => {
                      hienThiImmediate();
                    });
                    console.log('Data synced from server');
                } else if (data.type === 'pong') {
                    // Ping response
                    console.log('Pong received');
                } else if (data.type === 'missing_data_response') {
                    // Đã bỏ logic missing data - các bộ phận độc lập
                    // Invalid cache khi missing data thay đổi
                    statsCache.dataHash = null;
                    requestAnimationFrame(() => {
                      hienThiImmediate(); // Refresh để hiển thị trạng thái mới
                    });
                }
            } catch (error) {
                console.error('Error parsing WebSocket message:', error);
            }
        };
        
        ws.onclose = function() {
            console.log('WebSocket disconnected');
            isConnected = false;
            updateConnectionStatus('offline');
            
            // Lưu dữ liệu hiện tại vào localStorage trước khi mất kết nối
            luuLocal();
            
            // Thử kết nối lại sau 3 giây
            setTimeout(() => {
                console.log('🔄 Thử kết nối lại...');
                initWebSocket();
            }, 3000);
        };
        
        ws.onerror = function(error) {
            console.error('WebSocket error:', error);
            updateConnectionStatus('error');
            
            // Lưu dữ liệu hiện tại vào localStorage khi có lỗi
            luuLocal();
            
            // Thử kết nối lại sau 5 giây khi có lỗi
            setTimeout(() => {
                console.log('🔄 Thử kết nối lại sau lỗi...');
                initWebSocket();
            }, 5000);
        };
        
    } catch (error) {
        console.error('Failed to create WebSocket connection:', error);
        updateConnectionStatus('error');
        
        // Lưu dữ liệu hiện tại vào localStorage khi không thể kết nối
        luuLocal();
        
        // Thử kết nối lại sau 10 giây khi không thể tạo kết nối
        setTimeout(() => {
            console.log('🔄 Thử kết nối lại sau lỗi tạo kết nối...');
            initWebSocket();
        }, 10000);
    }
}

function updateConnectionStatus(status) {
    const statusEl = document.getElementById('syncStatus');
    if (statusEl) {
        statusEl.textContent = status === 'online' ? '🟢 Đã kết nối' : 
                              status === 'offline' ? '🔴 Mất kết nối' : 
                              '⚠️ Lỗi kết nối';
        statusEl.className = `sync-status ${status}`;
    }
}

// Hàm xử lý khi kết nối lại thành công
function onReconnect() {
    console.log('🔄 Kết nối lại thành công, đồng bộ dữ liệu...');
    
    // Gửi dữ liệu hiện tại lên server
    syncToServer();
    
    // Cập nhật trạng thái kết nối
    updateConnectionStatus('online');
    
    // Hiển thị thông báo kết nối lại thành công
    console.log('✅ Đã kết nối lại và đồng bộ dữ liệu thành công');
}

function syncToServer() {
    if (ws && isConnected) {
        ws.send(JSON.stringify({
            type: 'update',
            module: MODULE_NAME,
            payload: duLieu,
            counters: {
                soDongMoi: soDongMoi,
                soDongCapNhat: soDongCapNhat,
                soDongMoiVuaThem: soDongMoiVuaThem,
                tongSoCapNhat: tongSoCapNhat
            }
        }));
        console.log('📤 Data synced to server');
    } else {
        console.log('❌ Không thể đồng bộ: WebSocket chưa kết nối');
    }
}

// Hàm kiểm tra dữ liệu thiếu từ bước trước
// Đã bỏ hàm checkMissingData - các bộ phận độc lập

// Hàm kiểm tra trạng thái kết nối và thử kết nối lại nếu cần
function checkConnectionStatus() {
    if (!isConnected) {
        console.log('🔄 Kiểm tra trạng thái kết nối...');
        initWebSocket();
    }
}

// Hàm thử kết nối lại với retry
function retryConnect(retryCount = 0) {
    const maxRetries = 5;
    if (retryCount >= maxRetries) {
        console.log('❌ Đã thử kết nối lại tối đa, dừng lại');
        return;
    }
    
    console.log(`🔄 Thử kết nối lại lần ${retryCount + 1}/${maxRetries}...`);
    initWebSocket();
    
    // Nếu vẫn không kết nối được sau 5 giây, thử lại
    setTimeout(() => {
        if (!isConnected) {
            retryConnect(retryCount + 1);
        }
    }, 5000);
}

// Hàm kiểm tra xem có thể cập nhật trạng thái hoàn thành không
function canUpdateToCompleted() {
    return MODULE_NAME === 'donghang'; // Chỉ bộ phận Đóng hàng có thể tự cập nhật trạng thái hoàn thành
}

// 🔥 TỐI ƯU HÀM LƯU VỚI DEBOUNCE
let saveTimeout = null;

function luuLocal(){
  // Invalid cache khi dữ liệu thay đổi
  statsCache.dataHash = null;
  statsCache.data = null;
  
  // Debounce lưu localStorage để tránh ghi quá nhiều
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    try {
      localStorage.setItem("duLieuDonghang", JSON.stringify(duLieu));
      localStorage.setItem("tongSoCapNhatDonghang", String(tongSoCapNhat));
      localStorage.setItem("soDongMoiDonghang", String(soDongMoi));
      localStorage.setItem("soDongMoiVuaThemDonghang", String(soDongMoiVuaThem));
      // Đã bỏ lưu nhật ký hoạt động
    } catch (error) {
      console.error('Error saving to localStorage:', error);
      // ✅ Cảnh báo nếu localStorage đầy
      if (error.name === 'QuotaExceededError' || error.code === 22) {
        alert('⚠️ Cảnh báo: Bộ nhớ localStorage đã đầy! Vui lòng xóa một số dữ liệu cũ hoặc xuất dữ liệu ra Excel để giải phóng dung lượng.');
      }
    }
    // Đồng bộ lên server
    syncToServer();
  }, 500); // Chờ 500ms sau khi dừng thay đổi
}

function donDepNhatKy(){
  return; // Đã bỏ logic nhật ký
}

function ghiNhatKy(hanhDong, sanPham, chiTiet = ''){
  return; // Đã bỏ logic nhật ký
}

}

// 🔥 HÀM THỐNG KÊ TỐI ƯU VỚI CACHE
function thongKe(){
  let thongKeDiv=document.getElementById("thongKe");
  if (!thongKeDiv) return;
  
  // Sử dụng filteredData nếu có (khi có filter), nếu không thì dùng duLieu
  // Kiểm tra xem có filter nào đang được áp dụng không
  const hasFilter = dotHangFilter || loaiHangFilter || loaiSXFilter || trangThaiFilter || tuNgayFilter || denNgayFilter || (document.getElementById("tuKhoa") && document.getElementById("tuKhoa").value.trim());
  const dataToUse = (hasFilter && filteredData !== undefined) ? filteredData : duLieu;
  
  // Kiểm tra cache - tạo hash từ dữ liệu đang dùng
  const currentHash = createDataHash(dataToUse);
  const now = Date.now();
  
  if (statsCache.data && 
      statsCache.dataHash === currentHash && 
      statsCache.timestamp && 
      (now - statsCache.timestamp) < statsCache.cacheDuration) {
    // Sử dụng cache
    thongKeDiv.innerHTML = statsCache.data;
    return;
  }
  
  // Tính toán thống kê mới với tối ưu hiệu suất
  const startTime = performance.now();
  
  let groupDot={},groupLoai={},groupSX={},groupMau={},groupSize={},groupTrangThai={};
  
  // Tối ưu: Sử dụng for loop thay vì forEach cho hiệu suất tốt hơn
  const dataLength = dataToUse.length;
  for (let i = 0; i < dataLength; i++) {
    const d = dataToUse[i];
    if (!d) continue;
    
    // Đếm theo nhóm - tối ưu với nullish coalescing
    groupDot[d.dotHang] = (groupDot[d.dotHang] || 0) + 1;
    groupLoai[d.loaiHang] = (groupLoai[d.loaiHang] || 0) + 1;
    groupSX[d.loaiSX] = (groupSX[d.loaiSX] || 0) + 1;
    
    if(d.mau) groupMau[d.mau] = (groupMau[d.mau] || 0) + 1;
    if(d.size) groupSize[d.size] = (groupSize[d.size] || 0) + 1;
    
    // Đếm theo trạng thái
    const trangThai = d.trangThai || 'Chưa có';
    groupTrangThai[trangThai] = (groupTrangThai[trangThai] || 0) + 1;
  }

  // Đảm bảo tất cả các biến đều là object hợp lệ
  if(!groupDot || typeof groupDot !== 'object') groupDot = {};
  if(!groupLoai || typeof groupLoai !== 'object') groupLoai = {};
  if(!groupTrangThai || typeof groupTrangThai !== 'object') groupTrangThai = {};
  if(!groupSX || typeof groupSX !== 'object') groupSX = {};
  if(!groupMau || typeof groupMau !== 'object') groupMau = {};
  if(!groupSize || typeof groupSize !== 'object') groupSize = {};
  
  // Render với tối ưu - thứ tự: Đợt hàng, Loại hàng, Trạng thái, Loại sản xuất, Màu, Size
  try {
    const htmlContent = `
      <div class="stat-row">
        ${renderGroup("Đợt hàng",groupDot, dataToUse)}
        ${renderGroup("Loại hàng",groupLoai, dataToUse)}
        ${renderGroup("Trạng thái",groupTrangThai, dataToUse)}
        ${renderGroup("Loại sản xuất",groupSX, dataToUse)}
        ${renderGroup("Màu",groupMau, dataToUse)}
        ${renderGroup("Size",groupSize, dataToUse)}
      </div>
    `;
  
    // Lưu vào cache
    statsCache.data = htmlContent;
    statsCache.dataHash = currentHash;
    statsCache.timestamp = now;
    
    // Hiển thị
    thongKeDiv.innerHTML = htmlContent;
    
    // Log hiệu suất (chỉ trong development)
    const endTime = performance.now();
    if (dataLength > 1000) {
      console.log(`⚡ Thống kê tính toán trong ${(endTime - startTime).toFixed(2)}ms cho ${dataLength} sản phẩm`);
    }
  } catch(error) {
    console.error('Lỗi khi render thống kê:', error);
    thongKeDiv.innerHTML = '<div class="error">Lỗi khi hiển thị thống kê</div>';
  }
}

// Hàm render dữ liệu từng batch để tránh đơ UI
function renderDataInBatches(data, startIndex) {
  // Tối ưu batch size dựa trên số lượng dữ liệu (giảm batch size cho dữ liệu lớn)
  const BATCH_SIZE = data.length > 3000 ? 15 : (data.length > 2000 ? 20 : (data.length > 1000 ? 30 : 50));
  const endIndex = Math.min(startIndex + BATCH_SIZE, data.length);
  const tbody = document.getElementById("tbody");
  const loadingIndicator = document.getElementById("loadingIndicator");
  let stt = startIndex + 1;
  
  // Hiển thị loading indicator nếu đang render batch đầu tiên (hiển thị sớm hơn cho dữ liệu lớn)
  if (startIndex === 0 && data.length > 50) {
    loadingIndicator.style.display = 'block';
    loadingIndicator.innerHTML = `
      <div class="loading-spinner"></div>
      <div>Đang tải dữ liệu... (${data.length} dòng)</div>
      <div style="font-size: 12px; margin-top: 5px;">Đã tải: ${startIndex}/${data.length}</div>
    `;
  }
  
  // Tối ưu: Tạo map để tìm index nhanh hơn
  const maGocToIndex = {};
  duLieu.forEach((item, index) => {
    maGocToIndex[item.maGoc] = index;
  });
  const originalIndices = data.map(item => maGocToIndex[item.maGoc] || -1);
  
  // Tính STT dựa trên trang hiện tại
  const globalStartIndex = (currentPage - 1) * itemsPerPage;
  
  for (let i = startIndex; i < endIndex; i++) {
    const item = data[i];
    const originalIndex = originalIndices[i] >= 0 ? originalIndices[i] : i; // Fallback nếu không tìm thấy
    const globalStt = globalStartIndex + i + 1;
    
    // Đã bỏ logic kiểm tra thiếu dữ liệu - các bộ phận độc lập
    
    const tr = document.createElement("tr");
    const classTrangThai = item.trangThai.replace(/\s+/g,'');
    
    // Thêm class và style cho sản phẩm đã hoàn thành và bị khóa (đã bỏ missing-data-row)
    const isLocked = item.locked || false;
    if (isLocked) {
      tr.classList.add('locked-row');
    }
    if (item.trangThai === 'Hoàn thành') {
      tr.classList.add('completed-row');
    }
    
    tr.innerHTML = `<td><input type='checkbox' class='row-check' data-index='${originalIndex}' ${isLocked ? 'disabled' : ''}></td>
    <td>${globalStt}</td>
    <td>
      <span>${item.maGoc}</span>
      <button title="Copy" onclick="copyMa('${item.maGoc.replace(/'/g, "&#39;")}', this)" style="margin-left:6px;padding:2px 6px;border:1px solid #ccc;background:#f5f5f5;border-radius:4px;cursor:pointer;">📋</button>
      ${isLocked ? '<span class="locked-badge">🔒</span>' : ''} ${item.trangThai === 'Hoàn thành' ? '<span class="completed-badge">✅ Hoàn thành</span>' : ''}
    </td>
    <td><span class="status-cell status-${classTrangThai}" style="font-weight:bold;padding:2px 6px;border-radius:4px;">${item.trangThai}</span></td>
    
    <td>${item.dotHang}</td>
    <td>${item.loaiHang}</td>
    <td>${item.loaiSX}</td>
    <td>${item.thoiGian}</td>
    
    <td><input type="text" value="${item.ghiChu||''}" onchange="capNhatGhiChu(${originalIndex}, this.value)" placeholder="Nhập ghi chú" ${isLocked ? 'disabled' : ''}></td>
    <td><button onclick="xemLichSu(${originalIndex})" ${isLocked ? 'disabled' : ''}>📜</button> <button onclick="xoaDong(${originalIndex})" style="background:#f44336;color:white;border:none;padding:2px 6px;border-radius:3px;cursor:pointer;" ${isLocked ? 'disabled' : ''}>🗑️</button></td>
    `;
    
    tbody.appendChild(tr);
  }
  
  // Cập nhật progress trong loading indicator
  if (loadingIndicator.style.display === 'block') {
    loadingIndicator.innerHTML = `
      <div class="loading-spinner"></div>
      <div>Đang tải dữ liệu... (${data.length} dòng)</div>
      <div style="font-size: 12px; margin-top: 5px;">Đã tải: ${endIndex}/${data.length}</div>
    `;
  }
  
  // Nếu còn dữ liệu, tiếp tục render batch tiếp theo
  if (endIndex < data.length) {
    // Sử dụng requestAnimationFrame cho dữ liệu lớn để render mượt mà hơn
    if (data.length > 2000) {
      requestAnimationFrame(() => renderDataInBatches(data, endIndex));
    } else {
      // Tăng delay cho dữ liệu lớn để tránh đơ UI
      const delay = data.length > 1000 ? 20 : 10;
      setTimeout(() => renderDataInBatches(data, endIndex), delay);
    }
  } else {
    // Ẩn loading indicator khi hoàn thành
    loadingIndicator.style.display = 'none';
  }
}

// Hàm render với pagination
function renderWithPagination() {
  const totalPages = Math.ceil(filteredData.length / itemsPerPage);
  const startIndex = (currentPage - 1) * itemsPerPage;
  const endIndex = Math.min(startIndex + itemsPerPage, filteredData.length);
  const pageData = filteredData.slice(startIndex, endIndex);
  
  // Cập nhật pagination controls
  updatePaginationControls(totalPages);
  
  // Dọn bảng trước khi render trang mới
  const tbody = document.getElementById("tbody");
  if (tbody) tbody.innerHTML = "";
  
  // Render dữ liệu trang hiện tại
  renderDataInBatches(pageData, 0);
}

// Copy mã sản phẩm vào clipboard
function copyMa(text, btn){
  try {
    const toCopy = (text || '').toString();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(toCopy).then(()=>{
        if (btn) { btn.textContent = '✅'; setTimeout(()=>{ btn.textContent = '📋'; }, 1000); }
      });
    } else {
      const temp = document.createElement('textarea');
      temp.value = toCopy;
      document.body.appendChild(temp);
      temp.select();
      document.execCommand('copy');
      document.body.removeChild(temp);
      if (btn) { btn.textContent = '✅'; setTimeout(()=>{ btn.textContent = '📋'; }, 1000); }
    }
  } catch(e) { console.warn('Copy failed', e); }
}

// Cập nhật pagination controls
function updatePaginationControls(totalPages) {
  const prevButton = document.getElementById("prevBtn");
  const nextButton = document.getElementById("nextBtn");
  const pageNumbers = document.getElementById("pageNumbers");
  
  // Cập nhật nút Previous/Next
  prevButton.disabled = currentPage <= 1;
  nextButton.disabled = currentPage >= totalPages;
  
  // Cập nhật số trang
  let pageNumbersHtml = "";
  const maxVisiblePages = 5;
  let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
  let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
  
  if (endPage - startPage + 1 < maxVisiblePages) {
    startPage = Math.max(1, endPage - maxVisiblePages + 1);
  }
  
  for (let i = startPage; i <= endPage; i++) {
    pageNumbersHtml += `<button onclick="goToPage(${i})" ${i === currentPage ? 'style="background:#2196F3;color:white;"' : ''}>${i}</button> `;
  }
  pageNumbers.innerHTML = pageNumbersHtml;
}

// Thay đổi trang
function changePage(direction) {
  const totalPages = Math.ceil(filteredData.length / itemsPerPage);
  const newPage = currentPage + direction;
  
  if (newPage >= 1 && newPage <= totalPages) {
    currentPage = newPage;
    renderWithPagination();
  }
}

// Đi đến trang cụ thể
function goToPage(page) {
  const totalPages = Math.ceil(filteredData.length / itemsPerPage);
  if (page >= 1 && page <= totalPages) {
    currentPage = page;
    renderWithPagination();
  }
}

// Thay đổi số dòng mỗi trang
function changeItemsPerPage() {
  itemsPerPage = parseInt(document.getElementById("itemsPerPageSelect").value);
  currentPage = 1;
  renderWithPagination();
}

function renderGroup(title,group, dataSource){
  if(!group || typeof group !== 'object') {
    group = {};
  }
  let html=`<div class='stat-cell'><h4>${title}</h4>`;
  html+=`<table class="stat-table">`;
  
  // Sắp xếp đặc biệt cho đợt hàng và size
  let sortedKeys = [];
  // Trường hợp đặc biệt: Đợt hàng cần tách theo 3 dây chuyền KP/HS/HT
  if (title === "Đợt hàng") {
    // Tạo thống kê theo tên đợt (bỏ tiền tố hs/ht) và 3 cột KP/HS/HT
    const normalizeDot = (dot) => {
      if (!dot) return "";
      const lower = dot.toLowerCase();
      if (lower.startsWith('hs')) return lower.substring(2);
      if (lower.startsWith('ht')) return lower.substring(2);
      return lower;
    };

    const stats = {};
    // Sử dụng dataSource nếu có (dữ liệu đã lọc), nếu không thì dùng duLieu
    const dataToProcess = dataSource || duLieu || [];
    dataToProcess.forEach(d => {
      const dotRaw = (d && d.dotHang) ? d.dotHang : "";
      const lower = dotRaw.toLowerCase();
      const base = normalizeDot(lower);
      const lane = lower.startsWith('hs') ? 'HS' : (lower.startsWith('ht') ? 'HT' : 'KP');
      if (!stats[base]) stats[base] = { KP: 0, HS: 0, HT: 0 };
      stats[base][lane] += 1;
    });

    // Hàm xác định thứ tự sắp xếp giống phần hiện tại
    const getOrder = (dot) => {
      if (!dot) return 8000;
      const lowerDot = dot.toLowerCase().trim();
      if (lowerDot.startsWith('sp')) {
        const num = lowerDot.match(/sp(\d+)/);
        if (num) return parseInt(num[1]);
        if (lowerDot.includes('thieu')) return 11;
        return 1000;
      }
      if (lowerDot === 'ctv') return 100;
      if (lowerDot === 'mvd') return 200;
      if (lowerDot === 'bnv') return 300;
      if (lowerDot.startsWith('si')) {
        if (lowerDot === 'sihoang') return 400;
        if (lowerDot === 'siminhhuong') return 500;
        return 600;
      }
      if (lowerDot.endsWith('lon')) {
        if (lowerDot === 'inlon') return 700;
        if (lowerDot === 'phoisoanlon') return 800;
        if (lowerDot === 'tonsoanlon') return 900;
        return 1000;
      }
      if (lowerDot === 'lun') return 1100;
      if (lowerDot === 'do') return 1200;
      if (lowerDot === 'mayhu') return 1300;
      if (lowerDot.endsWith('hu')) return 1400;
      return 7000;
    };

    const bases = Object.keys(stats).sort((a,b) => {
      const orderA = getOrder(a);
      const orderB = getOrder(b);
      return orderA === orderB ? a.localeCompare(b) : orderA - orderB;
    });

    // Header 3 cột: KP, HS, HT
    html+=`<tr><td class="label"></td><td class="value">KP</td><td class="value">HS</td><td class="value">HT</td></tr>`;
    bases.forEach(k => {
      const row = stats[k] || { KP:0, HS:0, HT:0 };
      html+=`<tr><td class="label">${k}</td><td class="value">${row.KP||0}</td><td class="value">${row.HS||0}</td><td class="value">${row.HT||0}</td></tr>`;
    });
    html+=`</table></div>`;
    return html;
  }
  if (title === "Loại hàng") {
    // Sắp xếp Loại hàng theo thứ tự cố định
    sortedKeys = Object.keys(group).sort((a, b) => {
      const indexA = LOAI_HANG_ORDER.indexOf(a.toLowerCase());
      const indexB = LOAI_HANG_ORDER.indexOf(b.toLowerCase());
      if (indexA !== -1 && indexB !== -1) {
        return indexA - indexB;
      }
      if (indexA !== -1) return -1;
      if (indexB !== -1) return 1;
      return a.localeCompare(b);
    });
  } else if (title === "Loại sản xuất" || title === "Loại SX") {
    // Sắp xếp Loại sản xuất theo thứ tự cố định
    sortedKeys = Object.keys(group).sort((a, b) => {
      const indexA = LOAI_SX_ORDER.indexOf(a.toLowerCase());
      const indexB = LOAI_SX_ORDER.indexOf(b.toLowerCase());
      if (indexA !== -1 && indexB !== -1) {
        return indexA - indexB;
      }
      if (indexA !== -1) return -1;
      if (indexB !== -1) return 1;
      return a.localeCompare(b);
    });
  } else if (title === "Màu") {
    // Sắp xếp Màu theo số lượng giảm dần (từ lớn đến bé)
    sortedKeys = Object.keys(group).sort((a, b) => {
      const valueA = group[a] || 0;
      const valueB = group[b] || 0;
      if (valueB !== valueA) {
        return valueB - valueA;
      }
      return a.localeCompare(b);
    });
  } else if (title === "Size") {
    // Sắp xếp Size theo thứ tự: S, M, L, XL, XXL
    sortedKeys = Object.keys(group).sort((a, b) => {
      const sizeOrder = { 'S': 1, 'M': 2, 'L': 3, 'XL': 4, 'XXL': 5 };
      const orderA = sizeOrder[a] || 999;
      const orderB = sizeOrder[b] || 999;
      
      if (orderA === orderB) {
        return a.localeCompare(b);
      }
      
      return orderA - orderB;
    });
  } else if (title === "Trạng thái") {
    // Hiển thị đặc biệt cho bảng Trạng thái: mỗi trạng thái trên một dòng với emoji
    sortedKeys = Object.keys(group).sort((a, b) => {
      const order = { 'Hoàn thành': 1 };
      const orderA = order[a] || 999;
      const orderB = order[b] || 999;
      if (orderA !== orderB) return orderA - orderB;
      return a.localeCompare(b);
    });
    
    sortedKeys.forEach(k=>{
      const count = group[k] || 0;
      let emoji = '';
      if (k === 'Hoàn thành') emoji = '✅';
      html+=`<tr><td class="label">${emoji} ${k}</td><td class="value">${count}</td></tr>`;
    });
    html+=`</table></div>`;
    return html;
  } else {
    // Sắp xếp bình thường cho các nhóm khác
    sortedKeys = Object.keys(group).sort();
  }
  
  sortedKeys.forEach(k=>{
    html+=`<tr><td class="label">${k}</td><td class="value">${group[k]}</td></tr>`;
  });
  html+=`</table></div>`;
  return html;
}

function layThoiGianTuMa(ma){
  if(!ma) return "";
  let m=ma.match(/(\d{1,2}\/\d{1,2}\/\d{4}.*)$/);
  return m?m[1].trim():"";
}

// Khóa duy nhất theo mã sản phẩm (bỏ phần thời gian sau dấu '|' cuối)
// (Giữ nguyên so trùng theo toàn bộ mã bao gồm thời gian ở cuối)

// 🔥 TỐI ƯU HÀM HIỂN THỊ VỚI DEBOUNCE VÀ CACHE
let filterTimeout = null;
let lastFilterState = null;

function hienThi(){
  // Debounce để tránh tính toán quá nhiều khi người dùng đang gõ
  clearTimeout(filterTimeout);
  filterTimeout = setTimeout(() => {
    hienThiImmediate();
  }, 150); // Chờ 150ms sau khi người dùng ngừng gõ
}

function hienThiImmediate(){
  const tuKhoa = document.getElementById("tuKhoa").value.trim().toLowerCase();
  // Khi thay đổi bộ lọc/tìm kiếm, luôn quay về trang 1
  currentPage = 1;
  
  // Lọc dữ liệu - hiển thị tất cả dữ liệu (không bỏ dòng hoàn thành)
  const activeData = duLieu; // Hiển thị tất cả dữ liệu
  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";
  let setDot=new Set(), setLoai=new Set(), setSX=new Set(), setTT=new Set();
  let stt = 1;
  
  // Tối ưu: Lọc dữ liệu trước khi render (chỉ hiển thị dữ liệu chưa hoàn thành)
  filteredData = activeData.filter((item, i) => {
    if(dotHangFilter&&item.dotHang!==dotHangFilter) return false;
    if(loaiHangFilter&&item.loaiHang!==loaiHangFilter) return false;
    if(loaiSXFilter&&item.loaiSX!==loaiSXFilter) return false;
    
    // Lọc theo thời gian (từ ngày đến ngày) - lấy từ mã sản phẩm
    if(tuNgayFilter || denNgayFilter) {
      // Lấy thời gian từ mã sản phẩm (maGoc hoặc ma)
      const maSanPham = item.maGoc || item.ma || "";
      const itemThoiGian = layThoiGianTuMa(maSanPham);
      
      if(itemThoiGian) {
        // Parse thời gian từ mã sản phẩm (hỗ trợ nhiều format)
        const parseDate = (dateStr) => {
          if(!dateStr) return null;
          
          // Format 1: DD/MM/YYYY hoặc DD/MM/YYYY HH:mm:ss (từ mã sản phẩm)
          const match1 = dateStr.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
          if(match1) {
            const day = parseInt(match1[1]);
            const month = parseInt(match1[2]) - 1; // Month is 0-indexed
            const year = parseInt(match1[3]);
            return new Date(year, month, day);
          }
          
          // Format 2: DD/MM/YYYY, HH:mm:ss (từ toLocaleString() - locale vi-VN)
          const match2 = dateStr.match(/(\d{1,2})\/(\d{1,2})\/(\d{4}),?\s*(\d{1,2}):(\d{1,2}):(\d{1,2})/);
          if(match2) {
            const day = parseInt(match2[1]);
            const month = parseInt(match2[2]) - 1;
            const year = parseInt(match2[3]);
            return new Date(year, month, day);
          }
          
          // Format 3: ISO format (YYYY-MM-DD hoặc YYYY-MM-DDTHH:mm:ss)
          const match3 = dateStr.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
          if(match3) {
            const year = parseInt(match3[1]);
            const month = parseInt(match3[2]) - 1;
            const day = parseInt(match3[3]);
            return new Date(year, month, day);
          }
          
          // Format 4: Thử parse bằng Date constructor (fallback)
          const parsed = new Date(dateStr);
          if(!isNaN(parsed.getTime())) {
            return parsed;
          }
          
          return null;
        };
        
        const itemDate = parseDate(itemThoiGian);
        if(itemDate) {
          // So sánh với từ ngày
          if(tuNgayFilter) {
            const tuNgay = new Date(tuNgayFilter);
            tuNgay.setHours(0, 0, 0, 0);
            if(itemDate < tuNgay) return false;
          }
          // So sánh với đến ngày
          if(denNgayFilter) {
            const denNgay = new Date(denNgayFilter);
            denNgay.setHours(23, 59, 59, 999);
            if(itemDate > denNgay) return false;
          }
        } else {
          // Nếu không parse được thời gian và có filter, bỏ qua item này
          if(tuNgayFilter || denNgayFilter) return false;
        }
      } else {
        // Nếu không có thời gian trong mã sản phẩm và có filter, bỏ qua item này
        if(tuNgayFilter || denNgayFilter) return false;
      }
    }
    
    // Lọc theo trạng thái
    if(trangThaiFilter) {
      if(item.trangThai !== trangThaiFilter) return false;
    }
    
    if (tuKhoa) {
      const norm = (s)=> (s||"").toString().toLowerCase().replace(/\s+/g,' ').trim();
      const needle = norm(tuKhoa);
      const haystack = norm([item.maGoc, item.ma, item.trangThai, item.dotHang, item.loaiHang, item.loaiSX, item.mau, item.size, item.thoiGian, item.ghiChu].join(' '));
      if (!haystack.includes(needle)) return false;
    }
    return true;
  });
  
  // Cập nhật số lượng hiển thị theo filter (sau khi lọc)
  const soLuongSauLoc = filteredData.length;
  const tongSo = duLieu.length;
  if(soLuongSauLoc === tongSo) {
    // Nếu không có filter, hiển thị như cũ
    document.getElementById("soDong").innerText=`🔢 Đã thêm: ${soDongMoiVuaThem} | Tổng: ${tongSo}`;
  } else {
    // Nếu có filter, hiển thị số lượng sau lọc và tổng số
    document.getElementById("soDong").innerText=`🔢 Đã thêm: ${soDongMoiVuaThem} | Sau lọc: ${soLuongSauLoc} / Tổng: ${tongSo}`;
  }
  
  // Render theo phân trang
  renderWithPagination();
  
  // Cập nhật filter dropdowns
  // 🔥 TỐI ƯU: Sử dụng for loop thay vì forEach cho hiệu suất tốt hơn
  for (let i = 0; i < activeData.length; i++) {
    const item = activeData[i];
    if (item) {
      setDot.add(item.dotHang);
      setLoai.add(item.loaiHang);
      setSX.add(item.loaiSX);
      setTT.add(item.trangThai);
    }
  }
  
  // Đã bỏ trạng thái "Thiếu bước trước" - các bộ phận độc lập
  
  // Sắp xếp đợt hàng theo thứ tự yêu cầu
  const dotHangArray = Array.from(setDot);
  console.log('Đợt hàng trước khi sắp xếp:', dotHangArray);
  
  const sortedDotHang = dotHangArray.sort((a, b) => {
    const getOrder = (dot) => {
      if (!dot) return 8000;
      const lowerDot = dot.toLowerCase().trim();
      
      // sp1, sp2, sp3, sp4, sp5, sp6, sp7, sp8, sp9, spht, spthieu (theo số thứ tự)
      if (lowerDot.startsWith('sp')) {
        const num = lowerDot.match(/sp(\d+)/);
        if (num) return parseInt(num[1]);
        if (lowerDot.includes('thieu')) return 11; // spthieu sau spht
        return 1000; // sp khác
      }
      
      // ctv, mvd, bnv (theo thứ tự trong hình)
      if (lowerDot === 'ctv') return 100;
      if (lowerDot === 'mvd') return 200;
      if (lowerDot === 'bnv') return 300;
      
      // si (bắt đầu bằng "si") - theo thứ tự trong hình
      if (lowerDot.startsWith('si')) {
        if (lowerDot === 'sihoang') return 400;
        if (lowerDot === 'siminhhuong') return 500;
        return 600; // si khác
      }
      
      // lon (kết thúc bằng "lon") - theo thứ tự trong hình
      if (lowerDot.endsWith('lon')) {
        if (lowerDot === 'inlon') return 700;
        if (lowerDot === 'phoisoanlon') return 800;
        if (lowerDot === 'tonsoanlon') return 900;
        return 1000; // lon khác
      }
      
      // hu (kết thúc bằng "hu") và các đợt khác - theo thứ tự trong hình
      if (lowerDot === 'lun') return 1100;
      if (lowerDot === 'do') return 1200;
      if (lowerDot === 'mayhu') return 1300;
      if (lowerDot.endsWith('hu')) return 1400;
      
      // khác
      return 7000;
    };
    
    const orderA = getOrder(a);
    const orderB = getOrder(b);
    
    // Nếu cùng thứ tự, sắp xếp theo tên
    if (orderA === orderB) {
      return a.localeCompare(b);
    }
    
    return orderA - orderB;
  });
  
  console.log('Đợt hàng sau khi sắp xếp:', sortedDotHang);
  
  document.getElementById("filterTrangThai").innerHTML='<option value="">-- Tất cả --</option>'+Array.from(setTT).map(o=>`<option ${o===trangThaiFilter?'selected':''}>${o}</option>`).join('');
  document.getElementById("filterDotHang").innerHTML='<option value="">-- Tất cả --</option>'+sortedDotHang.map(o=>`<option ${o===dotHangFilter?'selected':''}>${o}</option>`).join('');
  // Sắp xếp loại hàng theo thứ tự cố định
  const sortedLoaiHang = Array.from(setLoai).sort((a, b) => {
    const indexA = LOAI_HANG_ORDER.indexOf(a.toLowerCase());
    const indexB = LOAI_HANG_ORDER.indexOf(b.toLowerCase());
    if (indexA !== -1 && indexB !== -1) {
      return indexA - indexB;
    }
    if (indexA !== -1) return -1;
    if (indexB !== -1) return 1;
    return a.localeCompare(b);
  });
  document.getElementById("filterLoaiHang").innerHTML='<option value="">-- Tất cả --</option>'+sortedLoaiHang.map(o=>`<option ${o===loaiHangFilter?'selected':''}>${o}</option>`).join('');
  
  // Sắp xếp loại sản xuất theo thứ tự cố định
  const sortedLoaiSX = Array.from(setSX).sort((a, b) => {
    const indexA = LOAI_SX_ORDER.indexOf(a.toLowerCase());
    const indexB = LOAI_SX_ORDER.indexOf(b.toLowerCase());
    if (indexA !== -1 && indexB !== -1) {
      return indexA - indexB;
    }
    if (indexA !== -1) return -1;
    if (indexB !== -1) return 1;
    return a.localeCompare(b);
  });
  document.getElementById("filterLoaiSX").innerHTML='<option value="">-- Tất cả --</option>'+sortedLoaiSX.map(o=>`<option ${o===loaiSXFilter?'selected':''}>${o}</option>`).join('');
  
  // 🔥 TỐI ƯU: Invalid cache khi filter thay đổi và sử dụng requestAnimationFrame
  statsCache.dataHash = null;
  statsCache.data = null;
  if (duLieu.length > 0) {
    requestAnimationFrame(() => {
      thongKe();
    });
  }
}

// 🔥 TỐI ƯU HÀM THÊM NHIỀU VỚI PERFORMANCE
function themNhieu(){
  let soDongMoiTrongLay=0;let soDongCapNhatTrongLay=0;
  const text=document.getElementById("maSanPham").value.trim();
  if(!text)return;
  const trangThai="Nhận hàng"; // Trạng thái mặc định cho Đóng hàng
  const dong=text.split("\n");
  const sanitize=(s)=> (s||"").toString().replace(/\s+/g,'');
  
  // Tối ưu: Tạo Set một lần thay vì map mỗi lần
  const existingMaSet = new Set();
  const duLieuLength = duLieu.length;
  for (let i = 0; i < duLieuLength; i++) {
    const maSanitized = sanitize(duLieu[i]?.ma);
    if (maSanitized) {
      existingMaSet.add(maSanitized);
    }
  }
  
  // Invalid cache khi thêm sản phẩm
  statsCache.dataHash = null;
  statsCache.data = null;
  
  // Tối ưu: Xử lý batch với performance monitoring
  const startTime = performance.now();
  let processedCount = 0;
  
  for (let idx = 0; idx < dong.length; idx++) {
    const d = dong[idx];
    if(!d || !d.includes("=")) continue;
    const parts = d.split("=");
    if(parts.length < 2) continue; // Bỏ qua nếu không đủ phần
    const [dotHang,rawMa]=parts;
    const rawMaTrim=rawMa.trim();
    const maTime=layThoiGianTuMa(rawMaTrim);
    const key = sanitize(rawMaTrim);
    const foundIndex = duLieu.findIndex(it=>sanitize(it.ma)===key);
    const found = foundIndex>=0 ? duLieu[foundIndex] : null;
    if(found){
      // Không được phép thay đổi nếu đã Hoàn thành
      if(found.trangThai==='Hoàn thành'){
        continue;
      }
      if(found.trangThai!==trangThai){
        found.trangThai=trangThai;
        tongSoCapNhat++;
        soDongCapNhatTrongLay++;
        if(!found.lichSu) found.lichSu=[];
        found.lichSu.push({thoiGian: new Date().toLocaleString(), trangThai: trangThai});
      }
      continue;
    }
    
    // Tạo sản phẩm mới
    const loaiSX = rawMaTrim.includes("|") ? rawMaTrim.split("|")[0].split("-").pop().trim() : "";
    const loaiHang = rawMaTrim.includes("-") ? rawMaTrim.split("-")[0].trim() : "";

    // Lấy màu & size
    let mau="", size="";
    if (rawMaTrim.includes("|")) {
      const parts = rawMaTrim.split("|");
      if (parts.length > 1) {
        let desc = parts[1].split("/").pop().trim();

        // Nếu có dấu phẩy thì bỏ phần trước, chỉ giữ sau dấu phẩy
        if (desc.includes(",")) {
          desc = desc.split(",")[1].trim();
        }

        // Bỏ hậu tố [1], [2], ...
        let tokens = desc.split(" ")
          .map(t => t.trim().replace(/,$/,""))
          .filter(t => t && !/^\[\d+\]$/.test(t));

        if(tokens.length >= 2){
          size = tokens[tokens.length-1].toUpperCase(); // ✅ size cuối
          mau = tokens[0].toLowerCase();               // ✅ lấy màu đầu tiên sau dấu phẩy
        }
      }
    }

    const thoiGian=new Date().toLocaleString();
    const newProduct = {
      maGoc: d.trim(),
      ma: rawMaTrim,
      trangThai,
      dotHang: dotHang.trim().toLowerCase(),   // ✅ luôn viết thường
      loaiHang,
      loaiSX,
      mau,
      size,
      thoiGian,
      ghiChu: "",
      lichSu: [{ thoiGian: thoiGian, trangThai: trangThai }]
    };
    
    // Bỏ qua nếu đã tồn tại trùng toàn bộ mã (bao gồm cả thời gian cuối mã)
    // Tối ưu: Sử dụng existingMaSet thay vì seenKeys
    if (existingMaSet.has(key)) {
      continue; // ✅ Sửa: continue thay vì return để không dừng xử lý các dòng còn lại
    }
    existingMaSet.add(key); // Thêm vào Set để tránh trùng lặp trong batch
    soDongMoiTrongLay++;
    soDongMoi++;
    duLieu.push(newProduct);
    
    // Đã bỏ ghi nhật ký hoạt động
    
    // Đã bỏ kiểm tra thiếu dữ liệu - các bộ phận độc lập
    
    processedCount++;
  }
  
  // 🔥 TỐI ƯU: Log performance nếu xử lý nhiều
  if (processedCount > 100) {
    const endTime = performance.now();
    console.log(`⚡ Xử lý ${processedCount} dòng trong ${(endTime - startTime).toFixed(2)}ms`);
  }
  
  soDongCapNhat += soDongCapNhatTrongLay;
  soDongMoiVuaThem = soDongMoiTrongLay; // Lưu số lượng vừa thêm
  document.getElementById("maSanPham").value="";
  
  // Invalid cache và render với requestAnimationFrame
  statsCache.dataHash = null;
  statsCache.data = null;
  requestAnimationFrame(() => {
    hienThiImmediate();
    luuLocal();
  });
}

        // Lọc dữ liệu theo ngày nếu có filter
        let dataToExport = duLieu;

        const parseDate = (dateStr) => {
          if(!dateStr) return null;
          const match1 = dateStr.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
          if(match1) {

          }
          const match2 = dateStr.match(/(\d{1,2})\/(\d{1,2})\/(\d{4}),?\s*(\d{1,2}):(\d{1,2}):(\d{1,2})/);
          if(match2) {

              const month = parseInt(match2[2], 10) - 1;

            const brand = extractBrand(maSP); // Dùng mã sản phẩm thực tế để xác định nhãn hiệu
            
            if (!maSanPhamData[maSP]) {
              maSanPhamData[maSP] = {
                brand: brand,
                count: 0,
                colors: {}
              };
            }
            
            maSanPhamData[maSP].count++;
            if (d.mau) {
              const mau = d.mau.toLowerCase();
              maSanPhamData[maSP].colors[mau] = (maSanPhamData[maSP].colors[mau] || 0) + 1;
            }
          });

          // Tạo mảng dữ liệu theo nhãn hiệu
          const brandData = {};
          brandOrder.forEach(brand => {
            brandData[brand] = [];
          });

          // Hàm loại bỏ tên nhãn hiệu khỏi mã sản phẩm
          const removeBrandFromCode = (maSP, brand) => {
            // Loại bỏ tên nhãn hiệu ở đầu mã sản phẩm
            let code = maSP.trim();
            const brandUpper = brand.toUpperCase().replace(/\s+/g, ''); // Loại bỏ khoảng trắng trong brand: "CAOSU"
            
            // Loại bỏ khoảng trắng trong mã sản phẩm để so sánh
            const codeNoSpace = code.toUpperCase().replace(/\s+/g, '');
            
            // Kiểm tra nếu mã sản phẩm (không có khoảng trắng) bắt đầu bằng brand (không có khoảng trắng)
            if (codeNoSpace.startsWith(brandUpper)) {
              // Tìm vị trí kết thúc của brand trong mã gốc (có thể có khoảng trắng)
              let removedLength = 0;
              let charCount = 0;
              
              // Đếm số ký tự (không phải khoảng trắng) đã duyệt
              for (let i = 0; i < code.length && charCount < brandUpper.length; i++) {
                if (code[i].toUpperCase() !== ' ') {
                  charCount++;
                }
                removedLength = i + 1;
              }
              
              // Loại bỏ khoảng trắng sau brand nếu có
              while (removedLength < code.length && code[removedLength] === ' ') {
                removedLength++;
              }
              
              // Loại bỏ phần brand và khoảng trắng
              code = code.substring(removedLength).trim();
            }
            
            return code || maSP; // Trả về mã gốc nếu không thể loại bỏ
          };

          // Phân loại mã sản phẩm vào các nhãn hiệu
          Object.keys(maSanPhamData).forEach(maSP => {
            const data = maSanPhamData[maSP];
            const brand = data.brand;
            if (brandData[brand]) {
              // Tạo chuỗi mô tả màu
              const colorParts = [];
              Object.keys(data.colors).sort().forEach(mau => {
                const count = data.colors[mau];
                colorParts.push(`${count}${mau}`);
              });
              const colorStr = colorParts.length > 0 ? `(${colorParts.join(', ')})` : '';
              
              // Loại bỏ tên nhãn hiệu khỏi mã sản phẩm khi hiển thị trong cột của nhãn hiệu đó
              const maSPWithoutBrand = removeBrandFromCode(maSP, brand);
              
              brandData[brand].push({
                maGoc: maSP,
                count: data.count,
                display: `${maSPWithoutBrand} (${data.count}) ${colorStr}`
              });
            }
          });

          // Sắp xếp các mã sản phẩm trong mỗi nhãn hiệu theo số lượng giảm dần (bán nhiều nhất trước)
          Object.keys(brandData).forEach(brand => {
            if (brandData[brand] && brandData[brand].length > 0) {
              brandData[brand].sort((a, b) => {
                // Sắp xếp theo số lượng giảm dần
                return b.count - a.count;
              });
            }
          });

          // Tính tổng số lượng cho mỗi nhãn hiệu
          const brandTotals = {};
          Object.keys(brandData).forEach(brand => {
            if (brandData[brand] && brandData[brand].length > 0) {
              brandTotals[brand] = brandData[brand].reduce((sum, item) => sum + (item.count || 0), 0);
            }
          });

          // Chỉ giữ lại các nhãn hiệu có dữ liệu và sắp xếp theo tổng số lượng giảm dần
          const activeBrands = brandOrder.filter(brand => {
            return brandData[brand] && brandData[brand].length > 0;
          }).sort((a, b) => {
            // Sắp xếp theo tổng số lượng giảm dần
            const totalA = brandTotals[a] || 0;
            const totalB = brandTotals[b] || 0;
            return totalB - totalA; // Giảm dần
          });

          // Tìm số hàng tối đa
          let maxRows = 0;
          activeBrands.forEach(brand => {
            if (brandData[brand].length > maxRows) {
              maxRows = brandData[brand].length;
            }
          });

          // Tạo sheet
          const ws = workbook.addWorksheet(loaiSX);
          
          // Header row - chỉ hiển thị các nhãn hiệu có dữ liệu
          const headerRow = ws.addRow(['STT', ...activeBrands]);
          headerRow.font = { bold: true, color: { argb: 'FFFFFFFF' } };
          headerRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF2196F3' } };
          headerRow.height = 25;
          headerRow.eachCell((cell) => {
            applyCellStyle(cell, {
              horizontal: 'center',
              vertical: 'middle',
              wrapText: true,
              font: { bold: true, color: { argb: 'FFFFFFFF' } }
            });
          });

          // Data rows
          const totals = {};
          activeBrands.forEach(brand => {
            totals[brand] = 0;
          });

          for (let i = 0; i < maxRows; i++) {
            const row = [i + 1];
            activeBrands.forEach(brand => {
              const items = brandData[brand] || [];
              if (items[i]) {
                row.push(items[i].display);
                totals[brand] += items[i].count;
              } else {
                row.push('');
              }
            });
            
            const dataRow = ws.addRow(row);
            dataRow.eachCell((cell, colNumber) => {
              if (colNumber === 1) {
                // Cột STT: căn giữa
                applyCellStyle(cell, {
                  horizontal: 'center',
                  vertical: 'middle',
                  wrapText: true
                });
              } else {
                // Các cột khác: căn trái
                applyCellStyle(cell, {
                  horizontal: 'left',
                  vertical: 'middle',
                  wrapText: true
                });
              }
            });
          }

          // Tổng hàng - chỉ hiển thị cho các nhãn hiệu có dữ liệu
          const totalRow = ws.addRow(['TỔNG', ...activeBrands.map(brand => totals[brand] > 0 ? totals[brand] : '')]);
          totalRow.font = { bold: true };
          totalRow.eachCell((cell, colNumber) => {
            applyCellStyle(cell, {
              horizontal: colNumber === 1 ? 'center' : 'right',
              vertical: 'middle',
              wrapText: true
            });
          });

          // Tổng tất cả
          const grandTotal = activeBrands.reduce((sum, brand) => sum + (totals[brand] || 0), 0);
          const grandTotalRow = ws.addRow(['TỔNG TẤT CẢ', grandTotal]);
          grandTotalRow.font = { bold: true };
          grandTotalRow.eachCell((cell, colNumber) => {
            applyCellStyle(cell, {
              horizontal: colNumber === 1 ? 'center' : 'right',
              vertical: 'middle',
              wrapText: true
            });
          });

          // Top 30 Best Seller (chỉ lấy sản phẩm có số lượng >= 3)
          const allProducts = Object.keys(maSanPhamData).map(maSP => ({
            maSP: maSP,
            count: maSanPhamData[maSP].count,
            brand: maSanPhamData[maSP].brand
          })).filter(p => p.count >= 3) // Chỉ lấy sản phẩm có số lượng >= 3
            .sort((a, b) => b.count - a.count) // Sắp xếp giảm dần theo số lượng
            .slice(0, 30); // Lấy top 30

          if (allProducts.length > 0) {
            // Thêm hàng "Top 30 Seller"
            const top30HeaderRow = ws.addRow(['Top 30 Seller', '']);
            top30HeaderRow.font = { bold: true };
            top30HeaderRow.eachCell((cell, colNumber) => {
              applyCellStyle(cell, {
                horizontal: colNumber === 1 ? 'left' : 'left',
                vertical: 'middle',
                wrapText: true
              });
              // Thêm border cho hàng header
              cell.border = {
                top: { style: 'thin', color: { argb: 'FF000000' } },
                left: { style: 'thin', color: { argb: 'FF000000' } },
                bottom: { style: 'thin', color: { argb: 'FF000000' } },
                right: { style: 'thin', color: { argb: 'FF000000' } }
              };
            });

            // Thêm các hàng dữ liệu Top 30
            allProducts.forEach(product => {
              const row = ws.addRow([product.maSP, product.count]);
              row.eachCell((cell, colNumber) => {
                applyCellStyle(cell, {
                  horizontal: colNumber === 1 ? 'left' : 'right',
                  vertical: 'middle',
                  wrapText: true
                });
                // Thêm border cho các cell
                cell.border = {
                  top: { style: 'thin', color: { argb: 'FF000000' } },
                  left: { style: 'thin', color: { argb: 'FF000000' } },
                  bottom: { style: 'thin', color: { argb: 'FF000000' } },
                  right: { style: 'thin', color: { argb: 'FF000000' } }
                };
              });
            });
          }

          // Auto fit columns
          autoFitColumns(ws);
          
          // Cố định hàng tiêu đề
          freezeHeaderRow(ws);
        };

        // Tạo 4 sheet: in, kt, theu, tp
        createMaSanPhamSheet('in');
        createMaSanPhamSheet('kt');
        createMaSanPhamSheet('theu');
        createMaSanPhamSheet('tp');

        // --- Ghi file ---
        let fileName = 'Donghang_Loc';
        if(tuNgayFilter || denNgayFilter) {
          if(tuNgayFilter && denNgayFilter) {
            const tuNgay = tuNgayFilter.replace(/-/g, '');
            const denNgay = denNgayFilter.replace(/-/g, '');
            fileName = `Donghang_Loc_${tuNgay}_${denNgay}`;
          } else if(tuNgayFilter) {
            const tuNgay = tuNgayFilter.replace(/-/g, '');
            fileName = `Donghang_Loc_tu_${tuNgay}`;
          } else if(denNgayFilter) {
            const denNgay = denNgayFilter.replace(/-/g, '');
            fileName = `Donghang_Loc_den_${denNgay}`;
          }
        } else {
        const ngay = new Date().toLocaleDateString('vi-VN').replace(/\//g, "-");
          fileName = `Donghang_Loc_${ngay}`;
        }
        const buffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${fileName}.xlsx`;
        a.click();
        window.URL.revokeObjectURL(url);
      } catch (error) {
        console.error('Lỗi khi xuất Excel theo lọc:', error);
        alert('⚠️ Có lỗi xảy ra khi xuất Excel theo lọc: ' + (error.message || error));
      }
    });
  } catch (error) {
    console.error('Lỗi khởi tạo:', error);
  }
});

</script>
