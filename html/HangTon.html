// Debounce function để tối ưu tìm kiếm
let searchDebounceTimer = null;
function debounce(func, wait) {
  return function(...args) {
    clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => func.apply(this, args), wait);
  };
}

// WebSocket functions
function initWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}`;
    
    try {
        ws = new WebSocket(wsUrl);
        
        ws.onopen = function() {
            console.log('WebSocket connected');
            isConnected = true;
            updateConnectionStatus('online');
            
            // Đăng ký module - kiểm tra trạng thái trước khi gửi
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'register',
                    module: MODULE_NAME
                }));
            }
        };
        
        ws.onmessage = function(event) {
            try {
                const data = JSON.parse(event.data);
                
                if (data.type === 'sync' && data.module === MODULE_NAME) {
                    // Nhận dữ liệu đồng bộ từ server
                    duLieu = data.data || [];
                    hienThi();
                    console.log('Data synced from server');
                } else if (data.type === 'pong') {
                    // Ping response
                    console.log('Pong received');
                }
            } catch (error) {
                console.error('Error parsing WebSocket message:', error);
            }
        };
        
        ws.onclose = function() {
            console.log('WebSocket disconnected');
            isConnected = false;
            updateConnectionStatus('offline');
            
            // Thử kết nối lại sau 3 giây
            setTimeout(initWebSocket, 3000);
        };
        
        ws.onerror = function(error) {
            console.error('WebSocket error:', error);
            updateConnectionStatus('error');
        };
        
    } catch (error) {
        console.error('Failed to create WebSocket connection:', error);
        updateConnectionStatus('error');
    }
}

function updateConnectionStatus(status) {
    const statusEl = document.getElementById('syncStatus');
    if (statusEl) {
        statusEl.textContent = status === 'online' ? '🟢 Đã kết nối' : 
                              status === 'offline' ? '🔴 Mất kết nối' : 
                              '⚠️ Lỗi kết nối';
        statusEl.className = `sync-status ${status}`;
    }
}

function syncToServer() {
    if (ws && isConnected && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
            type: 'update',
            module: MODULE_NAME,
            payload: duLieu
        }));
        console.log('Data synced to server');
    }
}

// Hàm kiểm tra sản phẩm có trong bộ phận sau (Đóng hàng) không
async function checkProductInNextDept(maGoc) {
  try {
    const response = await fetch('/api/donghang');
    if (!response.ok) return false;
    const data = await response.json();
    if (!data || !Array.isArray(data)) return false;
    const sanitize = (s) => (s || "").toString().replace(/\s+/g, '');
    const maGocSanitized = sanitize(maGoc);
    return data.some(p => sanitize(p.maGoc || p.ma) === maGocSanitized);
  } catch (error) {
    console.error('Error checking product in next dept:', error);
    return false;
  }
}

function thongKe(){
  let thongKeDiv=document.getElementById("thongKe");
  let groupDot={},groupLoai={},groupSX={},groupMau={},groupSize={},groupTrangThai={};
  // Thống kê trạng thái cho từng nhóm
  let statusByDot={},statusByLoai={},statusBySX={},statusByMau={},statusBySize={};
  const seen = new Set();
  duLieu.forEach(d=>{
    const key = (d.maGoc||"").toString().trim();
    if (!key || seen.has(key)) return;
    seen.add(key);
    
    const dot = d.dotHang || '';
    const loai = d.loaiHang || '';
    const sx = d.loaiSX || '';
    const mau = d.mau || '';
    const size = d.size || '';
    const trangThai = d.trangThai || '';
    const maGoc = d.maGoc || '';
    
    groupDot[dot]=(groupDot[dot]||0)+1;
    groupLoai[loai]=(groupLoai[loai]||0)+1;
    groupSX[sx]=(groupSX[sx]||0)+1;
    if(mau) groupMau[mau]=(groupMau[mau]||0)+1;
    if(size) groupSize[size]=(groupSize[size]||0)+1;
    
    // Đếm theo trạng thái
    const trangThaiKey = trangThai || 'Chưa có';
    groupTrangThai[trangThaiKey] = (groupTrangThai[trangThaiKey] || 0) + 1;
    
    // Đếm trạng thái
    if(trangThai === 'Hoàn thành') {
      statusByDot[dot] = (statusByDot[dot] || 0) + 1;
      statusByLoai[loai] = (statusByLoai[loai] || 0) + 1;
      statusBySX[sx] = (statusBySX[sx] || 0) + 1;
      if(mau) statusByMau[mau] = (statusByMau[mau] || 0) + 1;
      if(size) statusBySize[size] = (statusBySize[size] || 0) + 1;
    } else if(trangThai === 'Bàn giao') {
      statusByDot[dot] = (statusByDot[dot] || 0) + 1;
      statusByLoai[loai] = (statusByLoai[loai] || 0) + 1;
      statusBySX[sx] = (statusBySX[sx] || 0) + 1;
      if(mau) statusByMau[mau] = (statusByMau[mau] || 0) + 1;
      if(size) statusBySize[size] = (statusBySize[size] || 0) + 1;
    }
  });

  // Gom thành 1 dòng 6 cột (thứ tự: Đợt hàng, Loại hàng, Trạng thái, Loại sản xuất, Màu, Size)

  `;
}

// Hàm render dữ liệu từng batch để tránh đơ UI
function renderDataInBatches(data, startIndex) {
  // Tối ưu batch size dựa trên số lượng dữ liệu (giảm batch size cho dữ liệu lớn)
  const BATCH_SIZE = data.length > 3000 ? 15 : (data.length > 2000 ? 20 : (data.length > 1000 ? 30 : 50));
  const endIndex = Math.min(startIndex + BATCH_SIZE, data.length);
  const tbody = document.getElementById("tbody");
  const loadingIndicator = document.getElementById("loadingIndicator");
  let stt = startIndex + 1;
  
  // Hiển thị loading indicator nếu đang render batch đầu tiên (hiển thị sớm hơn cho dữ liệu lớn)
  if (startIndex === 0 && data.length > 50) {
    loadingIndicator.style.display = 'block';
    loadingIndicator.innerHTML = `
      <div class="loading-spinner"></div>
      <div>Đang tải dữ liệu... (${data.length} dòng)</div>
      <div style="font-size: 12px; margin-top: 5px;">Đã tải: ${startIndex}/${data.length}</div>
    `;
  }
  
  // Tìm index gốc trong duLieu
  const originalIndices = data.map(item => duLieu.findIndex(d => d.maGoc === item.maGoc));
  
  // Tính STT dựa trên trang hiện tại
  const globalStartIndex = (currentPage - 1) * itemsPerPage;
  
  for (let i = startIndex; i < endIndex; i++) {
    const item = data[i];
    const originalIndex = originalIndices[i];
    const globalStt = globalStartIndex + i + 1;
    
    const tr = document.createElement("tr");
    const classTrangThai = item.trangThai.replace(/\s+/g,'');
    
    // Thêm class và style cho sản phẩm đã hoàn thành
    if (item.trangThai === 'Hoàn thành') {
      tr.classList.add('completed-row');
    }
    
    // Xác định trạng thái hiển thị
    const displayStatus = (item.trangThai === 'Hoàn thành' || !item.trangThai) ? 'Bàn giao' : item.trangThai;
    const displayClass = displayStatus.replace(/\s+/g,'');
    
    tr.innerHTML = `<td><input type='checkbox' class='row-check' data-index='${originalIndex}'></td>
    <td>${globalStt}</td>
    <td>
      <span>${item.maGoc}</span>
      <button title="Copy" onclick="copyMa('${item.maGoc.replace(/'/g, "&#39;")}', this)" style="margin-left:6px;padding:2px 6px;border:1px solid #ccc;background:#f5f5f5;border-radius:4px;cursor:pointer;">📋</button>
    </td>
    <td><span class="status-cell status-${displayClass}" style="font-weight:bold;padding:2px 6px;border-radius:4px;">${displayStatus}</span></td>
    
    <td>${item.dotHang}</td>
    <td>${item.loaiHang}</td>
    <td>${item.loaiSX}</td>
    <td>${item.mau||""}</td>
    <td>${item.size||""}</td>
    <td>${item.thoiGian}</td>
    
    <td><input type="text" value="${item.ghiChu||''}" onchange="capNhatGhiChu(${originalIndex}, this.value)" placeholder="Nhập ghi chú"></td>
    <td><button onclick="xemLichSu(${originalIndex})">📜</button> <button onclick="xoaDong(${originalIndex})" style="background:#f44336;color:white;border:none;padding:2px 6px;border-radius:3px;cursor:pointer;">🗑️</button></td>
    `;
    
    tbody.appendChild(tr);
  }
  
  // Cập nhật progress trong loading indicator
  if (loadingIndicator.style.display === 'block') {
    loadingIndicator.innerHTML = `
      <div class="loading-spinner"></div>
      <div>Đang tải dữ liệu... (${data.length} dòng)</div>
      <div style="font-size: 12px; margin-top: 5px;">Đã tải: ${endIndex}/${data.length}</div>
    `;
  }
  
  // Nếu còn dữ liệu, tiếp tục render batch tiếp theo
  if (endIndex < data.length) {
    // Tăng delay cho dữ liệu lớn để tránh đơ UI (tăng delay cho dữ liệu rất lớn)
    const delay = data.length > 3000 ? 50 : (data.length > 2000 ? 30 : (data.length > 1000 ? 20 : 10));
    setTimeout(() => renderDataInBatches(data, endIndex), delay);
  } else {
    // Ẩn loading indicator khi hoàn thành
    loadingIndicator.style.display = 'none';
  }
}

// Hàm render với pagination
function renderWithPagination() {
  const totalPages = Math.ceil(filteredData.length / itemsPerPage);
  const startIndex = (currentPage - 1) * itemsPerPage;
  const endIndex = Math.min(startIndex + itemsPerPage, filteredData.length);
  const pageData = filteredData.slice(startIndex, endIndex);
  
  // Cập nhật pagination controls
  updatePaginationControls(totalPages);
  
  // Dọn bảng trước khi render trang mới
  const tbody = document.getElementById("tbody");
  if (tbody) tbody.innerHTML = "";
  
  // Render dữ liệu trang hiện tại
  renderDataInBatches(pageData, 0);
}

// Copy mã sản phẩm vào clipboard
function copyMa(text, btn){
  try {
    const toCopy = (text || '').toString();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(toCopy).then(()=>{
        if (btn) { btn.textContent = '✅'; setTimeout(()=>{ btn.textContent = '📋'; }, 1000); }
      });
    } else {
      const temp = document.createElement('textarea');
      temp.value = toCopy;
      document.body.appendChild(temp);
      temp.select();
      document.execCommand('copy');
      document.body.removeChild(temp);
      if (btn) { btn.textContent = '✅'; setTimeout(()=>{ btn.textContent = '📋'; }, 1000); }
    }
  } catch(e) { console.warn('Copy failed', e); }
}

// Cập nhật pagination controls
function updatePaginationControls(totalPages) {
  const prevButton = document.getElementById("prevBtn");
  const nextButton = document.getElementById("nextBtn");
  const pageNumbers = document.getElementById("pageNumbers");
  
  // Cập nhật nút Previous/Next
  prevButton.disabled = currentPage <= 1;
  nextButton.disabled = currentPage >= totalPages;
  
  // Cập nhật số trang
  let pageNumbersHtml = "";
  const maxVisiblePages = 5;
  let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
  let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
  
  if (endPage - startPage + 1 < maxVisiblePages) {
    startPage = Math.max(1, endPage - maxVisiblePages + 1);
  }
  
  for (let i = startPage; i <= endPage; i++) {
    pageNumbersHtml += `<button onclick="goToPage(${i})" ${i === currentPage ? 'style="background:#2196F3;color:white;"' : ''}>${i}</button> `;
  }
  pageNumbers.innerHTML = pageNumbersHtml;
}

// Thay đổi trang
function changePage(direction) {
  const totalPages = Math.ceil(filteredData.length / itemsPerPage);
  const newPage = currentPage + direction;
  
  if (newPage >= 1 && newPage <= totalPages) {
    currentPage = newPage;
    renderWithPagination();
  }
}

// Đi đến trang cụ thể
function goToPage(page) {
  const totalPages = Math.ceil(filteredData.length / itemsPerPage);
  if (page >= 1 && page <= totalPages) {
    currentPage = page;
    renderWithPagination();
  }
}

// Thay đổi số dòng mỗi trang
function changeItemsPerPage() {
  itemsPerPage = parseInt(document.getElementById("itemsPerPageSelect").value);
  currentPage = 1;
  renderWithPagination();
}

function renderGroup(title,group,statusByGroup){
  let html=`<div class='stat-cell'><h4>${title}</h4>`;
  html+=`<table class="stat-table">`;
  
  // Bỏ cột trạng thái, chỉ hiển thị tên và số lượng
  
  // Sắp xếp đặc biệt cho đợt hàng và size
  let sortedKeys;
  if (title === "Đợt hàng") {
    sortedKeys = Object.keys(group).sort((a, b) => {
      const getOrder = (dot) => {
        if (!dot) return 8000;
        const lowerDot = dot.toLowerCase().trim();
        
        // sp1, sp2, sp3, sp4, sp5, sp6, sp7, sp8, sp9, spht, spthieu (theo số thứ tự)
        if (lowerDot.startsWith('sp')) {
          const num = lowerDot.match(/sp(\d+)/);
          if (num) return parseInt(num[1]);
          if (lowerDot.includes('thieu')) return 11; // spthieu sau spht
          return 1000; // sp khác
        }
        
        // ctv, mvd, bnv (theo thứ tự trong hình)
        if (lowerDot === 'ctv') return 100;
        if (lowerDot === 'mvd') return 200;
        if (lowerDot === 'bnv') return 300;
        
        // si (bắt đầu bằng "si") - theo thứ tự trong hình
        if (lowerDot.startsWith('si')) {
          if (lowerDot === 'sihoang') return 400;
          if (lowerDot === 'siminhhuong') return 500;
          return 600; // si khác
        }
        
        // lon (kết thúc bằng "lon") - theo thứ tự trong hình
        if (lowerDot.endsWith('lon')) {
          if (lowerDot === 'inlon') return 700;
          if (lowerDot === 'phoisoanlon') return 800;
          if (lowerDot === 'tonsoanlon') return 900;
          return 1000; // lon khác
        }
        
        // hu (kết thúc bằng "hu") và các đợt khác - theo thứ tự trong hình
        if (lowerDot === 'lun') return 1100;
        if (lowerDot === 'do') return 1200;
        if (lowerDot === 'mayhu') return 1300;
        if (lowerDot.endsWith('hu')) return 1400;
        
        // khác
        return 7000;
      };
      
      const orderA = getOrder(a);
      const orderB = getOrder(b);
      
      // Nếu cùng thứ tự, sắp xếp theo tên
      if (orderA === orderB) {
        return a.localeCompare(b);
      }
      
      return orderA - orderB;
    });
  } else if (title === "Loại hàng") {
    // Sắp xếp Loại hàng theo thứ tự cố định
    sortedKeys = Object.keys(group).sort((a, b) => {
      const indexA = LOAI_HANG_ORDER.indexOf(a.toLowerCase());
      const indexB = LOAI_HANG_ORDER.indexOf(b.toLowerCase());
      if (indexA !== -1 && indexB !== -1) {
        return indexA - indexB;
      }
      if (indexA !== -1) return -1;
      if (indexB !== -1) return 1;
      return a.localeCompare(b);
    });
  } else if (title === "Loại sản xuất" || title === "Loại SX") {
    // Sắp xếp Loại sản xuất theo thứ tự cố định
    sortedKeys = Object.keys(group).sort((a, b) => {
      const indexA = LOAI_SX_ORDER.indexOf(a.toLowerCase());
      const indexB = LOAI_SX_ORDER.indexOf(b.toLowerCase());
      if (indexA !== -1 && indexB !== -1) {
        return indexA - indexB;
      }
      if (indexA !== -1) return -1;
      if (indexB !== -1) return 1;
      return a.localeCompare(b);
    });
  } else if (title === "Màu") {
    // Sắp xếp Màu theo số lượng giảm dần (từ lớn đến bé)
    sortedKeys = Object.keys(group).sort((a, b) => {
      const valueA = group[a] || 0;
      const valueB = group[b] || 0;
      if (valueB !== valueA) {
        return valueB - valueA;
      }
      return a.localeCompare(b);
    });
  } else if (title === "Size") {
    // Sắp xếp Size theo thứ tự: S, M, L, XL, XXL
    sortedKeys = Object.keys(group).sort((a, b) => {
      const sizeOrder = { 'S': 1, 'M': 2, 'L': 3, 'XL': 4, 'XXL': 5 };
      const orderA = sizeOrder[a] || 999;
      const orderB = sizeOrder[b] || 999;
      
      if (orderA === orderB) {
        return a.localeCompare(b);
      }
      
      return orderA - orderB;
    });
  } else {
    // Sắp xếp bình thường cho các nhóm khác
    sortedKeys = Object.keys(group).sort();
  }
  
  sortedKeys.forEach(k=>{
    const count = group[k] || 0;
    // Bỏ cột trạng thái, chỉ hiển thị tên và số lượng
    html+=`<tr><td class="label">${k}</td><td class="value">${count}</td></tr>`;
  });
  html+=`</table></div>`;
  return html;
}

    // Hàm trích xuất mã sản phẩm ngắn gọn (chỉ phần sau dấu | đầu tiên)
    const getMaSanPhamNgan = (maGoc) => {
      if (!maGoc) return '';
      const maStr = maGoc.toString();
      const index = maStr.indexOf('|');
      if (index === -1) return maStr; // Nếu không có dấu |, trả về nguyên mã
      return maStr.substring(index + 1).trim(); // Lấy phần sau dấu | và trim
    };

    // Tạo workbook mới với ExcelJS
    const workbook = new ExcelJS.Workbook();
    
    // Hàm helper để xác định mức độ thụt lề từ nội dung
    const getIndentLevel = (value) => {
      if (!value || typeof value !== 'string') return 0;
    const leadingSpaces = value.length - value.trimStart().length;
    const trimmed = value.trim();
    if (trimmed.includes('Thống kê') || trimmed.includes('Tổng sản phẩm')) {
      return 0;
    }
    if (trimmed.startsWith('•')) {
      if (leadingSpaces >= 9) return 3;
      if (leadingSpaces >= 6) return 2;
      return 2;
    } else if (trimmed.startsWith('-')) {
      if (leadingSpaces >= 6) return 2;
      return 1;
    }
    if (leadingSpaces >= 9) return 3;
    if (leadingSpaces >= 6) return 2;
    if (leadingSpaces >= 3) return 1;
    return 0;
  };

  const cleanIndentString = (value) => {
    if (!value || typeof value !== 'string') return value;
    return value.trimStart();
  };

  const applyCellStyle = (cell, options = {}) => {
    const cellValue = cell.value;
    const indentLevel = options.indent !== undefined ? options.indent : getIndentLevel(cellValue);
    cell.alignment = {
      vertical: options.vertical || 'middle',
      horizontal: options.horizontal || 'left',
      wrapText: options.wrapText !== false,
      indent: indentLevel
    };
    cell.border = {
      top: {style:'thin', color:{argb:'FF000000'}},
      left: {style:'thin', color:{argb:'FF000000'}},
      bottom: {style:'thin', color:{argb:'FF000000'}},
      right: {style:'thin', color:{argb:'FF000000'}}
    };
    if(options.font) { cell.font = options.font; }

      cell.value = cleanIndentString(cellValue);

          const headerCell = headerRow.getCell(colIndex + 1);
          if (headerCell && headerCell.value !== null && headerCell.value !== undefined) {
            maxLength = String(headerCell.value).length;
          }

  const pivot={};
  dataHT.forEach(d=>{
    if(!d.loaiHang||!d.mau||!d.size) return;
    const loai=d.loaiHang,mau=d.mau,size=d.size.toUpperCase();
    if(!pivot[loai]) pivot[loai]={};
    if(!pivot[loai][mau]) pivot[loai][mau]={};
    pivot[loai][mau][size]=(pivot[loai][mau][size]||0)+1;
  });

  const rows=[["Loại hàng","Màu",...sizes,"Tổng SL"]];
  let tongTatCa=0;
  const loaiHangKeys = Object.keys(pivot);
  loaiHangKeys.forEach((loai, index)=>{
    // Sắp xếp màu theo số lượng giảm dần (từ lớn đến bé)
    const sortedMau = Object.keys(pivot[loai]).sort((mauA, mauB) => {
      let tongA = 0;
      let tongB = 0;
      sizes.forEach(sz => {
        tongA += pivot[loai][mauA][sz] || 0;
        tongB += pivot[loai][mauB][sz] || 0;
      });
      if (tongB !== tongA) {
        return tongB - tongA;
      }
      return mauA.localeCompare(mauB);
    });
    
    sortedMau.forEach(mau=>{
      const row=[loai,mau];
      let tongDong=0;
      sizes.forEach(sz=>{
        const sl=pivot[loai][mau][sz]||0;
        row.push(sl);
        tongDong+=sl;
      });
      row.push(tongDong);
      tongTatCa+=tongDong;
      rows.push(row);
    });
    
    // Thêm hàng trống để phân cách giữa các loại hàng (trừ loại hàng cuối cùng)
    if (index < loaiHangKeys.length - 1) {
      rows.push([]);
    }
  });
  rows.push([]);
  rows.push(["Tổng tất cả","","",...Array(sizes.length-1).fill(""),tongTatCa]);

  // Sheet 4: Pivot với ExcelJS
  const wsPivot = workbook.addWorksheet('Pivot');
  const pivotHeaderRow = wsPivot.addRow(rows[0]);
  pivotHeaderRow.font = { bold: true, color: { argb: 'FFFFFFFF' } };
  pivotHeaderRow.fill = {
    type: 'pattern',
    pattern: 'solid',
    fgColor: { argb: 'FF2196F3' }
  };
  pivotHeaderRow.height = 25;
  pivotHeaderRow.eachCell((cell) => {
    applyCellStyle(cell, {
      horizontal: 'center',
      vertical: 'middle',
      wrapText: true,
      font: { bold: true, color: { argb: 'FFFFFFFF' } }
    });
  });
  
  rows.slice(1).forEach((row, index) => {
    const excelRow = wsPivot.addRow(row);
    excelRow.eachCell((cell, colNumber) => {
      applyCellStyle(cell, {
        horizontal: colNumber > 2 && colNumber <= 2 + sizes.length ? 'center' : 
                   colNumber === 2 + sizes.length + 1 ? 'center' : 'left',
        vertical: 'middle',
        wrapText: true
      });
      if (index === rows.length - 2) {
        cell.font = { bold: true };
        cell.fill = {
          type: 'pattern',
          pattern: 'solid',
          fgColor: { argb: 'FFE3F2FD' }
        };
      }
    });
  });

  // Hàm helper để cố định hàng tiêu đề (freeze panes)
  const freezeHeaderRow = (worksheet) => {
    if (!worksheet) return;
    worksheet.views = [
      {
        state: 'frozen',
        ySplit: 1,
        topLeftCell: 'A2',
        activeCell: 'A2'
      }
    ];
  };

  // Tự động điều chỉnh độ rộng cột cho tất cả các sheet
  autoFitColumns(wsChiTiet);
  autoFitColumns(wsThongKe);
  autoFitColumns(wsRutGon);
  autoFitColumns(wsPivot);

  // Cố định hàng tiêu đề chỉ cho sheet Chi_tiet và Pivot
  freezeHeaderRow(wsChiTiet);
  freezeHeaderRow(wsPivot);
  // Sheet Chi_tiet và Rut_gon không cần cố định hàng tiêu đề

    // --- Ghi file ---
    const ngay = new Date().toLocaleDateString('vi-VN').replace(/\//g, "-");
    const buffer = await workbook.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `HangTon_${ngay}.xlsx`;
    a.click();
    window.URL.revokeObjectURL(url);
  } catch (error) {
    console.error('Lỗi khi xuất Excel:', error);
    alert('⚠️ Có lỗi xảy ra khi xuất Excel: ' + (error.message || error));
  }
});

</script>
